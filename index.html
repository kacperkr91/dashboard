function kalEditEvent(dateStr,evId){
  event.stopPropagation();
  const events=getKalEvents();
  const ev=(events[dateStr]||[]).find(e=>e.id===evId);
  if(!ev)return;
  if(ev.isAuto){
    // Dla automatycznych płatności — pokaż uproszczony modal tylko z opcją wykonania
    _kalEditDate=dateStr;
    _kalEditId=evId;
    const isDone=isEventDone(dateStr,evId);
    const cat=katColor(ev.cat);
    document.getElementById('kalModalTitle').textContent=ev.title;
    document.getElementById('kalDate').value=dateStr;
    document.getElementById('kalDate').disabled=true;
    document.getElementById('kalTitle').value=ev.desc||'';
    document.getElementById('kalTitle').disabled=true;
    document.getElementById('kalDesc').value='';
    document.getElementById('kalDesc').disabled=true;
    document.getElementById('kalDeleteBtn').style.display='none';
    document.getElementById('kalCatPicker').style.display='none';
    document.getElementById('kalRecurRow').style.display='none';
    document.getElementById('kalSaveBtn').style.display='none';
    const doneRow=document.getElementById('kalDoneRow');
    const doneBtn=document.getElementById('kalDoneBtn');
    const doneLabel=document.getElementById('kalDoneLabel');
    if(doneRow&&doneBtn&&doneLabel){
      doneRow.style.display='flex';
      doneLabel.textContent=isDone?'✓ Wykonano':'○ Niewykonane';
      doneLabel.style.color=isDone?'#16a34a':'var(--text-muted)';
      doneBtn.textContent=isDone?'↩ Cofnij':'✓ Oznacz jako wykonane';
      doneBtn.style.background=isDone?'#fef2f2':'#dcfce7';
      doneBtn.style.borderColor=isDone?'#fca5a5':'#86efac';
      doneBtn.style.color=isDone?'#dc2626':'#16a34a';
    }
    document.getElementById('kalModal').style.display='flex';
    return;
  }
  _kalEditDate=dateStr;
  _kalEditId=evId;
  _kalSelectedCat=ev.cat||'inne';
  _kalSelectedRecur=ev.recur||'none';
  document.getElementById('kalModalTitle').textContent='Edytuj wydarzenie';
  document.getElementById('kalDate').value=ev.recur&&ev.recur!=='none'?dateStr:dateStr;
  document.getElementById('kalTitle').value=ev.title;
  document.getElementById('kalDesc').value=ev.desc||'';
  document.getElementById('kalDeleteBtn').style.display='block';
  document.getElementById('kalCatPicker').style.display='flex';
  document.getElementById('kalRecurRow').style.display='block';
  document.getElementById('kalSaveBtn').style.display='block';
  document.getElementById('kalDate').disabled=false;
  document.getElementById('kalTitle').disabled=false;
  document.getElementById('kalDesc').disabled=false;
  kalSelectCat(ev.cat||'inne');
  kalSelectRecur(ev.recur||'none');
  // Done state
  const doneRow=document.getElementById('kalDoneRow');
  const doneBtn=document.getElementById('kalDoneBtn');
  const doneLabel=document.getElementById('kalDoneLabel');
  if(doneRow&&doneBtn&&doneLabel){
    doneRow.style.display='flex';
    const isDone=isEventDone(dateStr,evId);
    doneRow.style.background=isDone?'#f0fdf4':'#fafbfc';
    doneRow.style.borderColor=isDone?'#86efac':'var(--border)';
    doneLabel.textContent=isDone?'✓ Wykonano':'○ Niewykonane';
    doneLabel.style.color=isDone?'#16a34a':'var(--text-muted)';

}

function kalSelectRecur(id){

  ['none','monthly','yearly'].forEach(r=>{

function kalSaveEvent(){
  const dateStr=document.getElementById('kalDate').value;
  const title=document.getElementById('kalTitle').value.trim();
  const desc=document.getElementById('kalDesc').value.trim();
  if(!dateStr||!title){alert('Wpisz tytuł i wybierz datę.');return;}

  const events=getKalEvents();
  const evId=_kalEditId||Date.now().toString();
  const evObj={id:evId,title,desc,cat:_kalSelectedCat,recur:_kalSelectedRecur};

  if(_kalEditId){
    // Edycja — usuń stary wpis z wszystkich dat (mogło być cykliczne)
    Object.keys(events).forEach(dk=>{
      events[dk]=events[dk].filter(e=>e.id!==_kalEditId);
      if(!events[dk].length)delete events[dk];
    });
  }

  // Generuj daty dla tego wydarzenia
  const dates=getRecurringDates(dateStr,_kalSelectedRecur);
  dates.forEach(dk=>{
    if(!events[dk])events[dk]=[];
    events[dk].push({...evObj});
  });

  saveKalEvents(events);
  kalCloseModal();
  const d=new Date(dateStr);
  _state.kalendarzYear=d.getFullYear();
  _state.kalendarzMonth=d.getMonth();
  renderApp();
}

function kalDeleteEvent(){
  if(!_kalEditDate||!_kalEditId)return;
  const events=getKalEvents();
  const ev=(events[_kalEditDate]||[]).find(e=>e.id===_kalEditId);
  const isRecur=ev&&ev.recur&&ev.recur!=='none';

  if(isRecur){
    const choice=confirm('Usunąć wszystkie wystąpienia tego cyklicznego wydarzenia?\n\nOK = usuń wszystkie\nAnuluj = tylko to jedno');
    if(choice){
      // Usuń wszystkie
      Object.keys(events).forEach(dk=>{
        events[dk]=events[dk].filter(e=>e.id!==_kalEditId);
        if(!events[dk].length)delete events[dk];
      });
    } else {
      // Usuń tylko to jedno
      if(events[_kalEditDate]){
        events[_kalEditDate]=events[_kalEditDate].filter(e=>e.id!==_kalEditId);
        if(!events[_kalEditDate].length)delete events[_kalEditDate];
      }
    }
  } else {
    if(!confirm('Usunąć to wydarzenie?'))return;
    if(events[_kalEditDate]){
      events[_kalEditDate]=events[_kalEditDate].filter(e=>e.id!==_kalEditId);
      if(!events[_kalEditDate].length)delete events[_kalEditDate];
    }
  }

  saveKalEvents(events);
  kalCloseModal();
  renderApp();
}

function kalToggleDoneFromModal(){
  if(!_kalEditDate||!_kalEditId)return;
  toggleDone(_kalEditDate,_kalEditId);
  // Odśwież stan przycisku w modalu
  const isDone=isEventDone(_kalEditDate,_kalEditId);
  const doneRow=document.getElementById('kalDoneRow');
  const doneBtn=document.getElementById('kalDoneBtn');

    doneLabel.textContent=isDone?'✓ Wykonano':'○ Niewykonane';
    doneLabel.style.color=isDone?'#16a34a':'var(--text-muted)';
    doneBtn.textContent=isDone?'↩ Cofnij':'✓ Oznacz jako wykonane';
    doneBtn.style.background=isDone?'#fef2f2':'#dcfce7';
    doneBtn.style.borderColor=isDone?'#fca5a5':'#86efac';

  }
}

function kalCloseModal(){
  document.getElementById('kalModal').style.display='none';
  _kalEditDate=null;_kalEditId=null;

function kalPrevMonth(){
  if(_state.kalendarzMonth===0){_state.kalendarzMonth=11;_state.kalendarzYear--;}
  else _state.kalendarzMonth--;
  renderApp();
}

function kalNextMonth(){
  if(_state.kalendarzMonth===11){_state.kalendarzMonth=0;_state.kalendarzYear++;}
  else _state.kalendarzMonth++;
  renderApp();
}

function kalGoToday(){

  _state.kalendarzMonth=n.getMonth();

/* NOTY KSIEGOWE */
function kwotaSlownie(kwota){
  try{kwota=parseFloat(kwota);}catch(e){return'—';}
  const grosze=Math.round((kwota%1)*100);
  const zl=Math.floor(kwota);

  const jednosci=['','jeden','dwa','trzy','cztery','pięć','sześć','siedem','osiem','dziewięć'];
  const nastki=['dziesięć','jedenaście','dwanaście','trzynaście','czternaście','piętnaście','szesnaście','siedemnaście','osiemnaście','dziewiętnaście'];
  const dziesiatki=['','dziesięć','dwadzieścia','trzydzieści','czterdzieści','pięćdziesiąt','sześćdziesiąt','siedemdziesiąt','osiemdziesiąt','dziewięćdziesiąt'];
  const setki=['','sto','dwieście','trzysta','czterysta','pięćset','sześćset','siedemset','osiemset','dziewięćset'];

  function trojka(n){
    if(n===0)return'';
    const s=setki[Math.floor(n/100)];
    const r=n%100;
    let t;
    if(r>=10&&r<=19){t=nastki[r-10];}
    else{const d=dziesiatki[Math.floor(r/10)];const j=jednosci[r%10];t=(d+' '+j).trim();}
    return(s+' '+t).trim();
  }

  function zlotowki(n){
    if(n===0)return'zero złotych';
    const mld=Math.floor(n/1000000000);
    const mln=Math.floor((n%1000000000)/1000000);
    const tys=Math.floor((n%1000000)/1000);
    const jed=n%1000;
    const parts=[];
    if(mld){const t=trojka(mld);parts.push(mld===1?t+' miliard':mld<=4?t+' miliardy':t+' miliardów');}
    if(mln){const t=trojka(mln);parts.push(mln===1?t+' milion':mln<=4?t+' miliony':t+' milionów');}
    if(tys){const t=trojka(tys);parts.push(tys===1?'tysiąc':tys<=4?t+' tysiące':t+' tysięcy');}
    if(jed)parts.push(trojka(jed));
    let text=parts.join(' ').trim();
    if(n===1)text+=' złoty';
    else if(n%10>=2&&n%10<=4&&!(n%100>=12&&n%100<=14))text+=' złote';
    else text+=' złotych';
    return text;
  }

  return zlotowki(zl)+` ${String(grosze).padStart(2,'0')}/100`;
}

function updateKwotaSlownie(){
  const kwota=document.getElementById('nota-kwota')?.value;
  const el=document.getElementById('nota-slownie');
  if(el)el.textContent=kwota?kwotaSlownie(kwota):'';
}

function getNotaById(id){
  return getNotyList().find(n=>n.id===id);
}

function saveAndGenerateNota(){
  const numer=document.getElementById('nota-numer')?.value.trim();
  const data=document.getElementById('nota-data')?.value.trim();
  const nabywca=document.getElementById('nota-nabywca')?.value.trim();
  const kwota=document.getElementById('nota-kwota')?.value.trim();
  const podstawa=document.getElementById('nota-podstawa')?.value.trim();
  const zaplata=document.getElementById('nota-zaplata')?.value;

  if(!numer||!nabywca||!kwota||!podstawa){
    alert('Uzupełnij: numer, nabywca, kwota i podstawa.');return;
  }
  if(!numer.match(/[a-zA-Z]$/)){
    alert('Wpisz literę na końcu numeru noty (np. 1/04/2026/A).');return;
  }

  const dataPrzelewu=document.getElementById('nota-data-przelewu')?.value.trim()||data;
  const nota={id:Date.now().toString(),numer,data,nabywca,kwota,podstawa,zaplata,dataPrzelewu};
  const list=getNotyList();
  list.push(nota);
  saveNotyList(list);
  generateNotaPDF(nota.id);
  renderApp();
}

function deleteNota(id){
  if(!confirm('Usunąć tę notę z listy?'))return;
  saveNotyList(getNotyList().filter(n=>n.id!==id));
  renderApp();
}

function previewNota(){
  const numer=document.getElementById('nota-numer')?.value.trim()||'—';
  const data=document.getElementById('nota-data')?.value.trim()||'—';
  const nabywca=document.getElementById('nota-nabywca')?.value.trim()||'—';
  const kwota=document.getElementById('nota-kwota')?.value.trim()||'0';
  const podstawa=document.getElementById('nota-podstawa')?.value.trim()||'—';
  const zaplata=document.getElementById('nota-zaplata')?.value||'—';
  openNotaPreview({numer,data,nabywca,kwota,podstawa,zaplata});
}

function generateNotaPDF(id){
  const n=getNotaById(id);
  if(!n){alert('Nie znaleziono noty.');return;}
  openNotaPreview(n);
}

function notaFromPrevioId(voucherId){
  const rows=window._previoDrawerRows||[];
  const r=rows.find(r=>(r.voucher||r.resId)===voucherId)||{};
  closePrevioDrawer();
  _state.section='noty';
  renderApp();
  setTimeout(()=>{
    const now=new Date();
    const mm=String(now.getMonth()+1).padStart(2,'0');
    const yyyy=now.getFullYear();
    const list=getNotyList();
    const miesNoty=list.filter(n=>n.numer&&n.numer.includes(`/${mm}/${yyyy}/`));
    const nextNum=miesNoty.length+1;

    const setVal=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val;};
    setVal('nota-numer',`${nextNum}/${mm}/${yyyy}/`);

    // Imię i nazwisko — pole gosc
    setVal('nota-nabywca', r.gosc||'');

    // Data wymeldowania jako data wystawienia
    if(r.dataDo){
      const d=parseDateDMY(r.dataDo);
      if(d){
        const dd=String(d.getDate()).padStart(2,'0');
        const dm=String(d.getMonth()+1).padStart(2,'0');
        const dy=d.getFullYear();
        setVal('nota-data',`${dd}.${dm}.${dy}`);
        setVal('nota-data-przelewu',`${dd}.${dm}.${dy}`);
      }
    }

    // Kwota brutto
    setVal('nota-kwota', r.cena||'');
    updateKwotaSlownie();

    // Opis — usługa noclegowa z apartamentem i datami
    const podstawa=`Usługa noclegowa — ${r.apt||''} (${r.dataOd||''}–${r.dataDo||''})`;
    setVal('nota-podstawa', podstawa);

    // Rodzaj zapłaty
    // Zostaw domyślny "Przelew bankowy" - nie nadpisuj
    document.getElementById('nota-nabywca')?.focus();
  },150);
}

  'JOR':'JO','PAK':'PK','BGD':'BD','LKA':'LK','IRN':'IR','IRQ':'IQ',
};

function getFlagEmoji(code){
  if(!code||code.length<2)return'🏳️';
  const upper=code.toUpperCase();
  // Konwertuj 3-literowy kod na 2-literowy
  const c2=(upper.length===3&&ISO3_TO_2[upper])?ISO3_TO_2[upper]:upper.slice(0,2);
  try{return String.fromCodePoint(...[...c2].map(l=>127397+l.charCodeAt(0)));}
  catch(e){return'🏳️';}
}

function buildGoscieView(){
  // Zbierz dane ze wszystkich miesięcy Previo
  const allRows=[];
  Object.values(_state.data.previo||{}).forEach(month=>{
    if(Array.isArray(month))month.forEach(r=>{if(!r.cancelled&&r.kraj)allRows.push(r);});
    else if(month?.rows)month.rows.forEach(r=>{if(!r.cancelled&&r.kraj)allRows.push(r);});
  });

  if(!allRows.length){
    return`<div class="grid-card" style="text-align:center;padding:40px;color:var(--text-muted)">
      <div style="font-size:32px;margin-bottom:12px">🌍</div>
      <div>Brak danych — załaduj dane Previo</div>
    </div>`;
  }

  // Zlicz kraje — normalizuj do oryginalnego kodu (2 lub 3 literowego)
  const krajCount={};
  const krajCena={};
  allRows.forEach(r=>{
    const raw=(r.kraj||'??').toUpperCase().trim();
    krajCount[raw]=(krajCount[raw]||0)+1;
    krajCena[raw]=(krajCena[raw]||0)+(r.cena||0);
  });

  const sorted=Object.entries(krajCount).sort((a,b)=>b[1]-a[1]);
  const total=allRows.length;
  const maxCount=sorted[0]?.[1]||1;

  // Top 3 highlights
  const top3=sorted.slice(0,3).map(([k,n],i)=>{
    const medals=['🥇','🥈','🥉'];
    const name=COUNTRY_NAMES[k]||k;
    const flag=getFlagEmoji(k);
    const pct=Math.round(n/total*100);
    return`<div style="flex:1;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;text-align:center">
      <div style="font-size:22px">${medals[i]}</div>
      <div style="font-size:28px;margin:4px 0">${flag}</div>
      <div style="font-size:14px;font-weight:700;color:var(--text)">${name}</div>
      <div style="font-size:22px;font-weight:800;color:var(--blue);margin:4px 0">${n}</div>
      <div style="font-size:11px;color:var(--text-muted)">${pct}% rezerwacji</div>
    </div>`;
  }).join('');

  // Full list
  const listRows=sorted.map(([k,n])=>{
    const name=COUNTRY_NAMES[k]||k;
    const flag=getFlagEmoji(k);
    const pct=Math.round(n/total*100);
    const barW=Math.round(n/maxCount*100);
    const totalCena=krajCena[k]||0;
    return`<div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
      <div style="font-size:22px;width:32px;text-align:center">${flag}</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:13px;font-weight:600;color:var(--text)">${name}</span>
          <span style="font-size:12px;color:var(--text-muted)">${n} rez. · ${pct}%</span>
        </div>
        <div style="background:var(--border);border-radius:4px;height:6px;overflow:hidden">
          <div style="background:var(--blue);height:100%;width:${barW}%;border-radius:4px;transition:width 0.3s"></div>
        </div>
      </div>
      <div style="font-size:12px;font-weight:600;color:var(--text-mid);white-space:nowrap;min-width:80px;text-align:right">${fmt(totalCena)} zł</div>
    </div>`;
  }).join('');

  // Channel breakdown per country (top 5)
  const chanByKraj={};
  allRows.forEach(r=>{
    const k=(r.kraj||'??').toUpperCase().trim();
    if(!chanByKraj[k])chanByKraj[k]={};
    chanByKraj[k][r.kanal]=(chanByKraj[k][r.kanal]||0)+1;
  });

  const top5=sorted.slice(0,5);
  const chanCols=top5.map(([k,n])=>{
    const name=COUNTRY_NAMES[k]||k;
    const flag=getFlagEmoji(k);
    const chans=Object.entries(chanByKraj[k]||{}).sort((a,b)=>b[1]-a[1]);
    const chanHtml=chans.map(([ch,cnt])=>`

function loadAllPrevioMonths(){
  const toLoad=PREVIO_MONTHS.filter(m=>{
    const d=_state.data.previo[m.key];
    return !d||(d.error)||(Array.isArray(d)&&d.length===0);
  });
  if(!toLoad.length){alert('Wszystkie miesiące już załadowane!');return;}

  let idx=0;
  const loadNext=async()=>{
    if(idx>=toLoad.length){renderApp();return;}
    const m=toLoad[idx++];
    try{
      const d=await loadPrevioMonth(m.key);
      _state.data.previo[m.key]=d;
    }catch(e){
      _state.data.previo[m.key]={error:e.message};
    }
    renderApp();
    await delay(1000);
    loadNext();
  };
  loadNext();
}


/* OBŁOŻENIE LIVE */
const WYLACZONE_APT=['Orzeszkowej']; // apartamenty których już nie wynajmujemy
const ZEWNETRZNE_APT=['Wawel','Wawel II no. 15','Wawel II no. 14','Zamkowa','Bronowicka','Plac Szczepański B41','Plac Szczepański C41']; // nie-OTV

function buildOblozenieLive(){
  const today=new Date();today.setHours(0,0,0,0);
  const localDk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayStr=localDk(today);
  const tmr=new Date(today);tmr.setDate(today.getDate()+1);
  const tmrStr=localDk(tmr);

  const dzien=_state.oblozenieDzien||'dzis';
  const filtry=_state.oblozenieFiltry||'wszystkie';
  const targetDate=dzien==='dzis'?today:tmr;
  const targetStr=dzien==='dzis'?todayStr:tmrStr;
  const DOW=['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
  const MONTHS_PL=['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
  const dateLabel=d=>`${d.getDate()} ${MONTHS_PL[d.getMonth()]} (${DOW[d.getDay()]})`;

  // Zbierz wszystkie aktywne rezerwacje z Previo
  const allRows=[];
  Object.values(_state.data.previo||{}).forEach(month=>{
    if(Array.isArray(month))month.forEach(r=>{
      if(!r.cancelled&&r.apt&&!WYLACZONE_APT.some(w=>r.apt.includes(w))){
        if(filtry==='otv'&&ZEWNETRZNE_APT.some(w=>r.apt.includes(w)))return;
        allRows.push(r);
      }
    });
  });

  if(!allRows.length){
    return`<div class="grid-card" style="text-align:center;padding:40px;color:var(--text-muted)">
      <div style="font-size:32px;margin-bottom:12px">🏠</div>
      <div>Brak danych Previo — odśwież dashboard</div>
    </div>`;
  }

  // Kategoryzuj dla wybranego dnia
  const wymeldowania=[];   // dataDo = targetStr
  const zameldowania=[];   // dataOd = targetStr
  const wTrakcie=[];       // dataOd < targetStr < dataDo

  // Wszystkie aktywne apartamenty (bez wyłączonych)
  const wszystkieApty=new Set(allRows.map(r=>r.apt).filter(Boolean));

  allRows.forEach(r=>{
    if(!r.dataOd||!r.dataDo)return;
    const od=r.dataOd.slice(0,10);
    const doD=r.dataDo.slice(0,10);
    // Klonuj obiekt żeby uniknąć mutacji między renderami
    if(doD===targetStr) wymeldowania.push({...r});
    else if(od===targetStr) zameldowania.push({...r});
    else if(od<targetStr&&doD>targetStr) wTrakcie.push({...r});
  });

  // ── Wykryj przeprowadzki i przedłużenia ──
  // Tylko gdy gość MA zameldowanie tego samego dnia (dataOd = targetStr)
  // NIE oznaczaj jeśli gość po prostu wyjeżdża po wcześniejszej przeprowadzce
  const normGosc=s=>(s||'').toLowerCase().trim().replace(/\s+/g,' ');
  wymeldowania.forEach(wym=>{
    const g=normGosc(wym.gosc);
    if(!g)return;
    // Szukaj tego samego gościa w zameldowaniach — upewnij się że dataOd = dziś
    const match=zameldowania.find(zam=>{
      if(normGosc(zam.gosc)!==g)return false;
      // dataOd musi być dokładnie targetStr (zameldowanie dziś, nie wcześniej)
      return zam.dataOd?.slice(0,10)===targetStr;
    });
    if(match){
      if(match.apt===wym.apt){
        // Ten sam apartament = przedłużenie
        // Badge tylko gdy gość ma OBIE: wymeldowanie I zameldowanie dziś
        wym._typ='przedluzenie';
        match._typ='przedluzenie';
        wym._para=match;
        match._para=wym;
      } else {
        // Inny apartament = przeprowadzka
        wym._typ='przeprowadzka';
        match._typ='przeprowadzka';
        wym._paraApt=match.apt;
        match._paraApt=wym.apt;
      }
    }
  });

  // Wolne apartamenty
  const zajeteDzisApty=new Set([...wTrakcie.map(r=>r.apt),...zameldowania.map(r=>r.apt)]);
  const wolneApty=[...wszystkieApty].filter(a=>!zajeteDzisApty.has(a)).sort();

  // Wyczyść badge dla rezerwacji w trakcie i przedłużeń które już trwają
  wTrakcie.forEach(r=>{delete r._typ;delete r._paraApt;delete r._para;});
  // Przedłużenie oznaczaj tylko gdy gość ma wymeldowanie I zameldowanie dziś
  // (nie gdy jest już w trakcie nowej rezerwacji po przedłużeniu)
  zameldowania.forEach(r=>{
    if(r._typ==='przedluzenie'&&r.dataOd?.slice(0,10)!==targetStr){
      delete r._typ;delete r._paraApt;delete r._para;
    }
  });
  wymeldowania.forEach(r=>{
    if(r._typ==='przedluzenie'&&r.dataDo?.slice(0,10)!==targetStr){
      delete r._typ;delete r._paraApt;delete r._para;
    }
  });

  // Obłożenie %
  const total=wszystkieApty.size;
  const zajetyLiczba=zajeteDzisApty.size;
  const pctObl=total?Math.round(zajetyLiczba/total*100):0;

  // ADR = średnia cena za noc dla zajętych apartamentów
  const zajetyRez=[...wTrakcie,...zameldowania];
  const adr=zajetyRez.length
    ?Math.round(zajetyRez.reduce((s,r)=>s+(r.noce>0?r.cena/r.noce:r.cena),0)/zajetyRez.length)

  // RevPAR = łączny dzienny przychód / wszystkie dostępne apartamenty
  const przychodDziennyTotal=zajetyRez.reduce((s,r)=>s+(r.noce>0?r.cena/r.noce:r.cena),0);

  const CHAN_COLORS={'Booking.com':'#003580','Airbnb':'#FF5A5F','Profitroom':'#16a34a','Własna':'#7c3aed'};

  };

  const fmtHour=s=>s&&s.length>=16?s.slice(11,16):'';

    return`<div style="background:${r._typ==='przeprowadzka'?'#fffbeb':r._typ==='przedluzenie'?'#f5f3ff':'var(--white)'};border:1px solid ${r._typ?'#fcd34d':'var(--border)'};border-left:3px solid ${accent};border-radius:6px;padding:8px 10px;margin-bottom:6px">

        <span style="font-size:10px;color:var(--text-muted)">· ${r.noce} nocy</span>

  const aptFreeCard=apt=>`
    <div style="background:#f0fdf4;border:1px solid #86efac;border-left:3px solid #16a34a;border-radius:6px;padding:7px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">

    if(!aPozne&&bPozne)return 1;

  });

  const sortWTrakcie=arr=>[...arr].sort((a,b)=>{

    const da=(a.dataDo||'').slice(0,10);

function getPolishHolidays(year){
  // Fixed holidays
  const fixed=[
    `${year}-01-01`,`${year}-01-06`,
    `${year}-05-01`,`${year}-05-03`,
    `${year}-08-15`,`${year}-11-01`,`${year}-11-11`,
    `${year}-12-25`,`${year}-12-26`,
  ];
  // Easter (Meeus/Jones/Butcher algorithm)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  const easter=new Date(year,month-1,day);
  const easterStr=easter.toISOString().slice(0,10);
  // Easter Monday
  const em=new Date(easter);em.setDate(em.getDate()+1);
  const emStr=em.toISOString().slice(0,10);
  // Corpus Christi (60 days after Easter)
  const cc=new Date(easter);cc.setDate(cc.getDate()+60);
  const ccStr=cc.toISOString().slice(0,10);
  // Pentecost (49 days after Easter)
  const pent=new Date(easter);pent.setDate(pent.getDate()+49);
  const pentStr=pent.toISOString().slice(0,10);
  return new Set([...fixed,easterStr,emStr,ccStr,pentStr]);
}
function parseHKDate(dateStr){
  // accepts DD.MM.YYYY or DD.MM.YYYY or YYYY-MM-DD
  if(!dateStr||dateStr==='—')return null;
  let m=dateStr.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  m=dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}
function isHoliday(dateStr,year){
  const holidays=getPolishHolidays(year);
  const d=parseHKDate(dateStr);
  if(!d)return false;
  return holidays.has(d.toISOString().slice(0,10));
}

async function loadMarchData(){
  const{apiKey,spreadsheetId,dayTabRegex}=CONFIG;
  const all=await fetchSheetNames(spreadsheetId,apiKey);
  const day=all.filter(n=>dayTabRegex.test(n)&&n.endsWith('.03')).sort((a,b)=>{
    const[ad,am]=a.split('.').map(Number),[bd,bm]=b.split('.').map(Number);
    return am!==bm?am-bm:ad-bd;
  });
  if(!day.length)throw new Error('NO_DAY_TABS');

  // Fetch J3:J33 (apt names) + M3:M33 (amounts) for each day tab in parallel batches
  // Google Sheets batchGet supports up to 100 ranges — split into chunks if needed
  const CHUNK=40; // 2 ranges per tab = 40 tabs per request
  const results=[];
  for(let ci=0;ci<day.length;ci+=CHUNK){
    const chunk=day.slice(ci,ci+CHUNK);
    const params=new URLSearchParams({key:apiKey,valueRenderOption:'UNFORMATTED_VALUE'});
    chunk.forEach(n=>{
      params.append('ranges',`'${n}'!H3:H33`);  // channel
      params.append('ranges',`'${n}'!J3:J33`);  // apt name
      params.append('ranges',`'${n}'!K3:K33`);  // K = cena z systemu
    });
    const data=await apiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values:batchGet?${params}`);
    chunk.forEach((name,i)=>{
      const chanVals=data.valueRanges[i*3]?.values||[];
      const aptVals =data.valueRanges[i*3+1]?.values||[];
      const amtVals =data.valueRanges[i*3+2]?.values||[];
      const aptMap={};
      const chanMap={};
      for(let r=0;r<amtVals.length;r++){
        const amt=parseFloat(amtVals[r]?.[0]);
        if(isNaN(amt)||amt===0)continue;
        const aptName=String(aptVals[r]?.[0]||'').trim()||'Inny';
        aptMap[aptName]=(aptMap[aptName]||0)+amt;
        const raw=String(chanVals[r]?.[0]||'').trim().toLowerCase();
        const chan=raw.includes('booking')?'Booking.com':raw.includes('airbnb')?'Airbnb':raw.includes('profitroom')?'Profitroom':'Własna';
        chanMap[chan]=(chanMap[chan]||0)+amt;
      }
      const dayTotal=Object.values(aptMap).reduce((s,v)=>s+v,0);
      results.push({name,value:dayTotal||null,aptBreakdown:aptMap,chanBreakdown:chanMap});
    });
  }
  return results;
}

async function loadRawMonth(sheet,dateCol,amtCol,startRow,endRow,totalDays,moStr){
  const{apiKey,spreadsheetId}=CONFIG;
  // Fetch C=date, H=channel, J=apt, M=amount
  const params=new URLSearchParams({key:apiKey,valueRenderOption:'FORMATTED_VALUE'});
  params.append('ranges',`'${sheet}'!C${startRow}:C${endRow}`);   // date
  params.append('ranges',`'${sheet}'!H${startRow}:H${endRow}`);   // channel
  params.append('ranges',`'${sheet}'!J${startRow}:J${endRow}`);   // apt name
  params.append('ranges',`'${sheet}'!M${startRow}:M${endRow}`);   // amount
  const data=await apiFetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values:batchGet?${params}`);
  const dateVals =data.valueRanges[0]?.values||[];
  const chanVals =data.valueRanges[1]?.values||[];
  const aptVals  =data.valueRanges[2]?.values||[];
  const amtVals  =data.valueRanges[3]?.values||[];

  // group by day key
  const byDate={};  // key -> {value, aptBreakdown, chanBreakdown}
  for(let i=0;i<dateVals.length;i++){
    const dr=dateVals[i]?.[0];
    const ar=amtVals[i]?.[0];
    if(!dr||!ar)continue;
    const m=String(dr).match(/(\d{4})-(\d{2})-(\d{2})/);
    if(!m)continue;
    const[,yr,mo,dd]=m;
    const key=`${dd}.${mo}`;
    const amt=parseFloat(String(ar).replace(/[^\d.,-]/g,'').replace(',','.'));
    if(isNaN(amt)||amt===0)continue;

    if(!byDate[key])byDate[key]={value:0,aptBreakdown:{},chanBreakdown:{}};
    byDate[key].value+=amt;

    const aptName=String(aptVals[i]?.[0]||'').trim()||'Inny';
    byDate[key].aptBreakdown[aptName]=(byDate[key].aptBreakdown[aptName]||0)+amt;

    const rawChan=String(chanVals[i]?.[0]||'').trim().toLowerCase();
    const chan=rawChan.includes('booking')?'Booking.com':rawChan.includes('airbnb')?'Airbnb':rawChan.includes('profitroom')?'Profitroom':'Własna';
    byDate[key].chanBreakdown[chan]=(byDate[key].chanBreakdown[chan]||0)+amt;
  }

  const days=[];
  for(let d=1;d<=totalDays;d++){
    const key=String(d).padStart(2,'0')+'.'+moStr;
    if(byDate[key]!==undefined)days.push({name:key,...byDate[key]});
  }
  if(!days.length)throw new Error('NO_DATA');
  return days;
}

function easterDate(year){
  // Anonymous Gregorian algorithm
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  return new Date(year,month-1,day);
}

function getPolishHolidays(year){
  const easter=easterDate(year);
  const easterMs=easter.getTime();
  const addDays=(d,n)=>new Date(d.getTime()+n*86400000);
  const key=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

  const fixed=[
    `${year}-01-01`, // Nowy Rok
    `${year}-01-06`, // Trzech Króli
    `${year}-05-01`, // Święto Pracy
    `${year}-05-03`, // Konstytucja 3 Maja
    `${year}-08-15`, // Wniebowzięcie NMP
    `${year}-11-01`, // Wszystkich Świętych
    `${year}-11-11`, // Niepodległości
    `${year}-12-25`, // Boże Narodzenie
    `${year}-12-26`, // Drugi dzień BN
  ];
  const movable=[
    key(easter),                    // Wielkanoc
    key(addDays(easter,1)),         // Poniedziałek Wielkanocny
    key(addDays(easter,49)),        // Zielone Świątki
    key(addDays(easter,60)),        // Boże Ciało
  ];
  return new Set([...fixed,...movable]);
}


function parseDatePL(str){
  // handles formats: DD.MM.YYYY, D.M.YYYY, YYYY-MM-DD
  if(!str)return null;
  let m=str.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if(m)return new Date(parseInt(m[3]),parseInt(m[2])-1,parseInt(m[1]));
  m=str.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));
  return null;
}

const delay=ms=>new Promise(r=>setTimeout(r,ms));
async function safeLoad(fn){try{return{status:'fulfilled',value:await fn()};}catch(e){return{status:'rejected',reason:e};}}
async function refresh(){await init();}

async function init(){
  if(!CONFIG.apiKey||!CONFIG.spreadsheetId){mount(renderConfig());return;}
  _state.data={mar2026:null,feb2026:null,jan2026:null,dec2025:null,apr2026:null,media:null,apartments:null,housekeeping:{},otv:{},previo:{},parking:null,ksef:null};
  _kalCache=null;_paidCache=null;_doneCache=null;_ksefPaidCache=null;

  mount(`<div class="app"><header>
    <div class="brand"><div class="brand-icon">🏛️</div>
    <div><div class="brand-name">Old Town Vistula Premium Apartments</div>
    <div class="brand-sub">Ładowanie danych…</div></div></div>
  </header>
  <div class="state-screen">
    <div class="spinner"></div>
    <p id="loadMsg">Pobieranie danych…</p>
    <div id="loadBar" style="width:320px;height:6px;background:var(--border);border-radius:3px;margin-top:8px;overflow:hidden">
      <div id="loadFill" style="height:100%;width:0%;background:var(--blue);border-radius:3px;transition:width 0.4s ease"></div>
    </div>
  </div></div>`);

  const setProgress=(pct,msg)=>{
    const el=document.getElementById('loadFill');
    const ml=document.getElementById('loadMsg');
    if(el)el.style.width=pct+'%';
    if(ml)ml.textContent=msg;
  };

  setProgress(5,'Wykrywanie zakładek…');
  const syncPromise=CONFIG.syncUrl?syncPull():Promise.resolve();
  await Promise.allSettled([detectHkMonths(),detectOtvMonths()]);

  const initHkKey=_state.hkMonth;
  const initOtvKey=_state.otvMonth;
  const initPrevioKey=_state.previoMonth;
  const [pYr,pMo]=initPrevioKey.split('-');
  const lastYearPrevioKey=`${parseInt(pYr)-1}-${pMo}`;

  setProgress(15,'Ładowanie bieżącego miesiąca…');
  const [apr,previor,parkingr]=await Promise.allSettled([
    loadAprilData(),
    loadPrevioMonth(initPrevioKey),
    loadParkingData(),
  ]);
  _state.data.apr2026=apr.status==='fulfilled'?apr.value:{error:apr.reason?.message||'Błąd'};
  _state.data.previo[initPrevioKey]=previor.status==='fulfilled'?previor.value:{error:previor.reason?.message||'Błąd'};
  _state.data.parking=parkingr.status==='fulfilled'?parkingr.value:null;

  await delay(2000);

  setProgress(35,'Ładowanie marca i mediów…');
  const [mr,mdr]=await Promise.allSettled([
    loadRawMonth(CONFIG.marSheet,CONFIG.marDateCol,CONFIG.marAmountCol,CONFIG.marStartRow,CONFIG.marEndRow,31,'03'),
    loadMediaData(),
  ]);
  _state.data.mar2026=mr.status==='fulfilled'?mr.value:{error:mr.reason?.message||'Błąd'};
  _state.data.media=mdr.status==='fulfilled'?mdr.value:{error:mdr.reason?.message||'Błąd'};

  await delay(2000);

  setProgress(52,'Ładowanie lutego i stycznia…');
  const [fr,jr]=await Promise.allSettled([
    loadRawMonth(CONFIG.febSheet,CONFIG.febDateCol,CONFIG.febAmountCol,CONFIG.febStartRow,CONFIG.febEndRow,29,'02'),
    loadRawMonth(CONFIG.janSheet,CONFIG.janDateCol,CONFIG.janAmountCol,CONFIG.janStartRow,CONFIG.janEndRow,31,'01'),
  ]);
  _state.data.feb2026=fr.status==='fulfilled'?fr.value:{error:fr.reason?.message||'Błąd'};
  _state.data.jan2026=jr.status==='fulfilled'?jr.value:{error:jr.reason?.message||'Błąd'};

  await delay(2000);

  setProgress(67,'Ładowanie grudnia i apartamentów…');
  const [dr,ar]=await Promise.allSettled([
    loadRawMonth(CONFIG.decSheet,CONFIG.decDateCol,CONFIG.decAmountCol,CONFIG.decStartRow,CONFIG.decEndRow,31,'12'),
    loadApartmentsData(),
  ]);
  _state.data.dec2025=dr.status==='fulfilled'?dr.value:{error:dr.reason?.message||'Błąd'};
  _state.data.apartments=ar.status==='fulfilled'?ar.value:{error:ar.reason?.message||'Błąd'};

  await delay(2000);

  setProgress(82,'Ładowanie housekeeping i OTV…');
  const [hkr,otvr]=await Promise.allSettled([
    loadHousekeepingMonth(initHkKey),
    loadOtvMonth(initOtvKey),
  ]);
  _state.data.housekeeping[initHkKey]=hkr.status==='fulfilled'?hkr.value:{error:hkr.reason?.message||'Błąd'};
  _state.data.otv[initOtvKey]=otvr.status==='fulfilled'?otvr.value:{error:otvr.reason?.message||'Błąd'};

  await delay(2000);

  setProgress(93,'Finalizowanie prognozy…');
  const previoLYr=await safeLoad(()=>loadPrevioMonth(lastYearPrevioKey));
  if(previoLYr.status==='fulfilled')_state.data.previo[lastYearPrevioKey]=previoLYr.value;

  await syncPromise;
  setProgress(100,'Gotowe!');
  await delay(200);
  renderApp();
}

function getTodayBanner(){
  try{
    const events=getKalEvents();
    const today=new Date();
    const dk=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
    const todayEvs=events[dk]||[];
    const DOW_PL_FULL=['Niedziela','Poniedziałek','Wtorek','Środa','Czwartek','Piątek','Sobota'];
    const MONTHS_PL_GEN=['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
    const dateLabel=`${DOW_PL_FULL[today.getDay()]}, ${today.getDate()} ${MONTHS_PL_GEN[today.getMonth()]} ${today.getFullYear()}`;

    let parkingChip='';
    try{
      if(_state.data.parking?.dateOrder?.length){
        const paidDates=getPaidDates();
        const latestDate=_state.data.parking.dateOrder[0];
        const latestCards=_state.data.parking.byDate[latestDate]||[];
        const alertCount=latestCards.filter(c=>c.alert).length;
        const isPaid=paidDates.includes(latestDate);
        if(alertCount>0&&!isPaid){
          parkingChip=`<span onclick="setSection('parking')" style="display:inline-flex;align-items:center;gap:5px;background:#fef2f2;color:#dc2626;font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;cursor:pointer;border:1px solid #fca5a5;animation:pulse 1.5s infinite">🅿️ Parking — ${alertCount} kart do doładowania!</span>`;
        }
      }
    }catch(e){}

    const pendingEvs=[];
    for(let i=0;i<=3;i++){
      const d=new Date(today);d.setDate(today.getDate()-i);
      const pdk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      (events[pdk]||[]).forEach(ev=>{
        if(!isEventDone(pdk,ev.id)){
          pendingEvs.push({...ev,_dateKey:pdk,_daysAgo:i});
        }
      });
    }

    const kalItems=pendingEvs.map(ev=>{
      const cat=katColor(ev.cat);
      const icon=ev.cat==='platnosc'?'💰':ev.cat==='umowa'?'📝':ev.cat==='remont'?'🔧':ev.cat==='spotkanie'?'🤝':'📌';
      const overdue=ev._daysAgo>0?`<span style="font-size:10px;background:#fef2f2;color:#dc2626;padding:1px 5px;border-radius:4px;margin-left:3px">${ev._daysAgo}d temu</span>`:'';
      return`<span onclick="kalEditEvent('${ev._dateKey}','${ev.id}')" style="display:inline-flex;align-items:center;gap:5px;background:${ev._daysAgo>0?'#fef2f2':cat.bg};color:${ev._daysAgo>0?'#dc2626':cat.color};font-size:12px;font-weight:600;padding:4px 10px;border-radius:8px;white-space:nowrap;cursor:pointer;border:1px solid ${ev._daysAgo>0?'#fca5a5':'transparent'}">${icon} ${ev.title}${overdue}</span>`;
    }).join('');

    const allItems=(parkingChip||'')+kalItems||`<span style="font-size:12px;color:#92400e;opacity:0.6;font-style:italic">Brak wydarzeń — spokojny dzień ✌️</span>`;

    return`<div style="display:flex;align-items:center;gap:10px;background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;padding:11px 18px;margin-bottom:12px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(251,191,36,0.15)">
      <span style="font-size:12px;font-weight:700;color:#92400e;white-space:nowrap;flex-shrink:0">📅 ${dateLabel}</span>
      <div style="width:1px;height:18px;background:#fcd34d;flex-shrink:0"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;flex:1">${allItems}</div>
      <button onclick="setSection('kalendarz')" style="margin-left:auto;background:#fef3c7;border:1px solid #fcd34d;padding:4px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;color:#92400e;font-family:'Inter',sans-serif;white-space:nowrap;flex-shrink:0">Kalendarz →</button>
    </div>`;
  }catch(e){return'';}
}

  const k=document.getElementById('inp-apikey').value.trim();

  CONFIG.apiKey=k;CONFIG.spreadsheetId=s;
  CONFIG.mediaApiKey=mk;CONFIG.mediaSpreadsheetId=ms;
  CONFIG.aptsApiKey=ak;CONFIG.aptsSpreadsheetId=as_;
  CONFIG.ksefApiKey=kk;CONFIG.ksefSpreadsheetId=ks;

}

  }).catch(e=>{

}

  _state.section=s;

function generateHKMessage(){
  const today=new Date();today.setHours(0,0,0,0);
  const localDk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const todayStr=localDk(today);

  // Zawsze tylko OTV — twarda lista wykluczeń niezależna od filtra w widoku
  const WYKLUCZ=['wawel','zamkowa','bronowicka','plac szczepański','orzeszkowej'];
  const isWykluczone=apt=>WYKLUCZ.some(w=>apt.toLowerCase().includes(w));

  const allRows=[];
  Object.values(_state.data.previo||{}).forEach(month=>{
    if(Array.isArray(month))month.forEach(r=>{
      if(!r.cancelled&&r.apt&&!isWykluczone(r.apt))allRows.push({...r});
    });
  });

  const fmtHour=s=>s&&s.length>=16?s.slice(11,16):'';
  const wymeldowania=[];
  const zameldowania=[];

  allRows.forEach(r=>{
    if(!r.dataOd||!r.dataDo)return;
    const od=r.dataOd.slice(0,10);
    const doD=r.dataDo.slice(0,10);
    if(doD===todayStr)wymeldowania.push({...r});
    else if(od===todayStr)zameldowania.push({...r});
  });

  const normGosc=s=>(s||'').toLowerCase().trim().replace(/\s+/g,' ');
  wymeldowania.forEach(wym=>{
    const g=normGosc(wym.gosc);if(!g)return;
    const match=zameldowania.find(zam=>normGosc(zam.gosc)===g&&zam.dataOd?.slice(0,10)===todayStr);
    if(match){
      if(match.apt===wym.apt){wym._typ='przedluzenie';match._typ='przedluzenie';}
      else{wym._typ='przeprowadzka';match._typ='przeprowadzka';wym._paraApt=match.apt;match._paraApt=wym.apt;}
    }
  });

  const pozneWym=wymeldowania.filter(r=>!r._typ&&(fmtHour(r.dataDo)||'10:00')>'10:00')
    .sort((a,b)=>(fmtHour(b.dataDo)||'').localeCompare(fmtHour(a.dataDo)||''));
  const wczesneZam=zameldowania.filter(r=>!r._typ&&(fmtHour(r.dataOd)||'16:00')<'16:00')
    .sort((a,b)=>(fmtHour(a.dataOd)||'').localeCompare(fmtHour(b.dataOd)||''));
  const przeprowadzki=wymeldowania.filter(r=>r._typ==='przeprowadzka');
  const przedluzenia=wymeldowania.filter(r=>r._typ==='przedluzenie');

  // "na razie bez próśb" TYLKO gdy zero wyjątków
  const brakWyjatkow=!pozneWym.length&&!wczesneZam.length&&!przeprowadzki.length&&!przedluzenia.length;

  const lines=[];
  if(brakWyjatkow){
    lines.push('Dzień dobry, na razie bez próśb');
  } else {
    lines.push('Dzień dobry,');
    if(pozneWym.length){
      lines.push('');lines.push('Późne wymeldowania:');
      pozneWym.forEach(r=>{const h=fmtHour(r.dataDo);lines.push('• '+r.apt+(h?' (do '+h+')':''));});
    }
    if(wczesneZam.length){
      lines.push('');lines.push('Wczesne zameldowania:');
      wczesneZam.forEach(r=>{const h=fmtHour(r.dataOd);lines.push('• '+r.apt+(h?' (od '+h+')':''));});
    }
    if(przeprowadzki.length){
      lines.push('');lines.push('Przeprowadzki:');
      przeprowadzki.forEach(r=>{lines.push('• '+r.apt+' → '+(r._paraApt||'?'));});
    }
    if(przedluzenia.length){
      lines.push('');lines.push('Przedłużenia:');
      przedluzenia.forEach(r=>{lines.push('• '+r.apt);});
    }
  }

  const msg=lines.join('\n');
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  modal.className='hk-modal';
  modal.innerHTML=`<div style="background:var(--white);border-radius:14px;padding:24px;max-width:500px;width:100%;max-height:80vh;display:flex;flex-direction:column;gap:16px">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:15px;font-weight:700;color:var(--text)">Wiadomość dla housekeepingu</div>
      <button onclick="this.closest('.hk-modal').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted)">✕</button>
    </div>
    <textarea id="hkMsgBox" style="flex:1;min-height:260px;background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:14px;font-family:monospace;font-size:13px;line-height:1.6;resize:none;color:#166534;outline:none"></textarea>
    <div style="display:flex;gap:10px">
      <button id="hkCopyBtn" style="flex:1;background:#25D366;color:#fff;border:none;padding:11px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">Kopiuj</button>
      <button onclick="this.closest('.hk-modal').remove()" style="background:var(--bg);border:1px solid var(--border);padding:11px 20px;border-radius:8px;font-size:13px;cursor:pointer;color:var(--text-muted);font-family:'Inter',sans-serif">Zamknij</button>
    </div>
  </div>`;
  document.body.appendChild(modal);
  document.getElementById('hkMsgBox').value=msg;
  document.getElementById('hkCopyBtn').onclick=function(){
    navigator.clipboard.writeText(document.getElementById('hkMsgBox').value).then(()=>{
      this.textContent='✓ Skopiowano!';this.style.background='#16a34a';
      setTimeout(()=>{this.textContent='Kopiuj';this.style.background='#25D366';},2000);
    });
  };
}
