          <tbody>
            ${filtered.map(item=>`
              <tr class="${item.status}">
                <td class="col-seller">
                  <div class="ksef-seller-name">${item.seller}</div>
                </td>
                <td class="col-ksef">${item.ksefNumber||'—'}</td>
                <td class="col-status"><span class="ksef-badge ${badgeClassFor(item.status)}">${labelFor(item)}</span></td>
                <td class="col-date">${item.issueDate||'—'}</td>
                <td class="col-date">${item.dueDate||'—'}</td>
                <td class="col-days">${item.daysToDue===''?'—':item.daysToDue}</td>
                <td class="col-amount" style="font-weight:700">${item.brutto||'0,00'} zł</td>
                <td class="col-nip">${item.nip||'—'}</td>
                <td class="col-paid">
                  ${item.status==='paid'
                    ? (item.manualPaidDate
                        ? `<button class="ksef-action-btn paid" onclick="clearKsefInvoicePaid('${item.ksefNumber.replace(/'/g,"\\'")}')">Usuń ręczne</button>`
                        : `<button class="ksef-action-btn paid" disabled style="cursor:default;opacity:.8">Auto</button>`)
                    : `<div class="ksef-paid-actions">
                        <button class="ksef-action-btn" onclick="markKsefInvoicePaidToday('${item.ksefNumber.replace(/'/g,"\\'")}')">Opłacona dziś</button>
                        <button class="ksef-action-btn" onclick="markKsefInvoicePaid('${item.ksefNumber.replace(/'/g,"\\'")}','${item.dueDate||item.issueDate||''}')">Wybierz datę</button>
                      </div>`
                  }
                </td>
                <td class="ksef-muted col-updated">${item.updatedAt||'—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  </div>`;
}

/* HOUSEKEEPING VIEW */
function buildHousekeepingView(){
  const monthKey=_state.hkMonth;
  const hkData=_state.data.housekeeping[monthKey];
  const rows=hkData?.rows||hkData; // backward compat
  const pracownicy=hkData?.pracownicy||[];
  const faktura=hkData?.faktura||{};
  const activeMonth=HK_MONTHS.find(m=>m.key===monthKey);

  const monthNav=`<div class="hk-month-nav">
    ${HK_MONTHS.map(m=>`<button class="hk-month-btn ${m.key===monthKey?'active':''}" onclick="setHkMonth('${m.key}')">${m.short}</button>`).join('')}
  </div>`;

  if(!rows){
    return monthNav+renderLoading('Ładowanie housekeeping…');
  }
  if(rows.error){
    return monthNav+renderError(rows.error);
  }
  if(!rows.length){
    return monthNav+`<div class="empty-section"><div class="empty-icon">🧹</div><p>Brak danych dla ${activeMonth?.label||monthKey}</p></div>`;
  }

  // KPIs
  const activeRows=rows.filter(r=>!r.cancelled);
  const totalSuma=activeRows.reduce((s,r)=>s+r.suma,0);
  const totalPranie=activeRows.reduce((s,r)=>s+r.pranie,0);
  const totalApt=activeRows.reduce((s,r)=>s+r.aptCena,0);
  const totalGos=activeRows.reduce((s,r)=>s+r.gosCena,0);
  const avgSuma=activeRows.length?totalSuma/activeRows.length:0;

  const kpis=`<div class="kpi-row">
    <div class="kpi-card c-green" style="animation-delay:0s"><div class="label">Koszt łączny</div><div class="value"><span class="sym">zł</span>${fmt(totalSuma)}</div><div class="sub">${activeRows.length} sprzątań (${rows.length-activeRows.length} anulowanych)</div></div>
    <div class="kpi-card" style="animation-delay:0.07s"><div class="label">Średni koszt</div><div class="value"><span class="sym">zł</span>${fmt(avgSuma)}</div><div class="sub">per sprzątanie</div></div>
    <div class="kpi-card" style="animation-delay:0.14s"><div class="label">Pranie</div><div class="value"><span class="sym">zł</span>${fmt(totalPranie)}</div><div class="sub">łącznie</div></div>
    <div class="kpi-card" style="animation-delay:0.21s"><div class="label">Sprzątanie</div><div class="value"><span class="sym">zł</span>${fmt(totalGos+activeRows.reduce((s,r)=>s+r.aptCena,0))}</div><div class="sub">apt + sprzątanie</div></div>
  </div>`;

  // Per-apt summary
  const byApt={};
  activeRows.forEach(r=>{
    if(!byApt[r.apt])byApt[r.apt]={suma:0,count:0,pranie:0,aptCena:0,gosCena:0};
    byApt[r.apt].suma+=r.suma;
    byApt[r.apt].count++;
    byApt[r.apt].pranie+=r.pranie;
    byApt[r.apt].aptCena+=r.aptCena;
    byApt[r.apt].gosCena+=r.gosCena;
  });
  const hkSort=_state.hkAptSort||'default';
  let aptsSorted=sortByDefaultOrder(Object.keys(byApt));
  if(hkSort==='suma')aptsSorted=[...aptsSorted].sort((a,b)=>byApt[b].suma-byApt[a].suma);
  else if(hkSort==='count')aptsSorted=[...aptsSorted].sort((a,b)=>byApt[b].count-byApt[a].count);
  const maxAptSuma=Math.max(...aptsSorted.map(a=>byApt[a].suma),1);

  const aptRows=aptsSorted.map(apt=>{
    const d=byApt[apt];
    const barW=Math.round(d.suma/maxAptSuma*100);
    return`<tr>
      <td style="font-weight:600">${apt}</td>
      <td class="num">${d.count}</td>
      <td class="num" style="font-weight:700;color:#0d9488">${fmt(d.suma)} zł</td>
      <td class="num">${fmt(d.pranie)} zł</td>
      <td class="num">${fmt(d.aptCena)} zł</td>
      <td class="num">${fmt(d.gosCena)} zł</td>
      <td style="width:120px"><div style="background:var(--border);border-radius:3px;overflow:hidden;height:7px"><div style="height:100%;width:${barW}%;background:#0d9488;border-radius:3px"></div></div></td>
    </tr>`;
  }).join('');

  const aptTable=`<div class="grid-card" style="animation:fadeUp 0.4s 0.1s ease both">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div class="card-title">Koszty per apartament — ${activeMonth?.label||monthKey}</div>
      <div style="display:flex;gap:6px">
        <span style="font-size:11px;color:var(--text-muted);align-self:center">Sortuj:</span>
        <button class="sort-btn ${_state.hkAptSort==='default'?'active':''}" onclick="setHkAptSort('default')">Domyślnie</button>
        <button class="sort-btn ${_state.hkAptSort==='suma'?'active':''}" onclick="setHkAptSort('suma')">Suma ↓</button>
        <button class="sort-btn ${_state.hkAptSort==='count'?'active':''}" onclick="setHkAptSort('count')">Ilość ↓</button>
      </div>
    </div>
    <div class="hk-table-wrap"><table class="hk-table">
      <thead><tr><th>Apartament</th><th class="num">Ilość</th><th class="num">Suma</th><th class="num">Pranie</th><th class="num">Apt</th><th class="num">Sprzątanie</th><th></th></tr></thead>
      <tbody>
        ${aptRows}
        <tr class="hk-total">
          <td>ŁĄCZNIE</td>
          <td class="num">${rows.length}</td>
          <td class="num">${fmt(totalSuma)} zł</td>
          <td class="num">${fmt(totalPranie)} zł</td>
          <td class="num">${fmt(totalApt)} zł</td>
          <td class="num">${fmt(totalGos)} zł</td>
          <td></td>
        </tr>
      </tbody>
    </table></div>
  </div>`;

  // Comparison chart across months
  const compChart=`<div class="chart-card" style="animation:fadeUp 0.4s 0.15s ease both">
    <div class="card-title">Trend miesięczny — koszty sprzątania</div>
    <div class="card-subtitle">Łączny koszt housekeeping per miesiąc</div>
    <div class="chart-wrap"><canvas id="hkTrendChart"></canvas></div>
  </div>`;

  // Full cleanings table
  // Group rows by date and add subtotals after each day
  const byDateOrder=[];
  const dateMap={};
  rows.forEach(r=>{
    const d=r.date||'—';
    if(!dateMap[d]){dateMap[d]=[];byDateOrder.push(d);}
    dateMap[d].push(r);
  });

  // precompute holidays
  const yearsNeeded=[...new Set(rows.map(r=>{const d=parseDateDMY(r.date);return d?d.getFullYear():null}).filter(Boolean))];
  const allHolidays={};
  yearsNeeded.forEach(y=>Object.assign(allHolidays,getPolishHolidays(y)));
  // Debug date format
  if(rows.length)console.log('HK date format sample:',rows[0].date, '→ parsed:',parseDateDMY(rows[0].date));

  const cleanRows=byDateOrder.map(date=>{
    const dayRows=dateMap[date];
    const dayTotal=dayRows.filter(r=>!r.cancelled).reduce((s,r)=>s+r.suma,0);
    const dateObj=parseDateDMY(date);
    const dk=dateObj?dateKey(dateObj):'';
    const dow=dateObj?dateObj.getDay():-1;
    const isSun=dow===0;
    const holName=allHolidays[dk]||'';
    const isRed=isSun||!!holName;
    const dowLabel=dateObj?DOW_PL_SHORT[dow]:'';
    const dayBg=isRed?'#fff5f5':'';
    const rowsHtml=dayRows.map((r,i)=>`<tr style="background:${r.cancelled?'#f8f8f8':isRed?'#fff5f5':i%2===0?'var(--white)':'#fafbfc'};${r.cancelled?'opacity:0.65':''}">
      <td style="${isRed?'color:#dc2626;font-weight:700':''}">${r.date||'—'} <span style="font-size:10px;color:${isRed?'#dc2626':'var(--text-muted)'};font-weight:600;margin-left:3px">${dowLabel}${holName?' · '+holName:''}</span></td>
      <td style="font-weight:600;${r.cancelled?'text-decoration:line-through;color:var(--text-muted)':''}">${r.apt}</td>
      <td class="num" style="${r.cancelled?'color:var(--text-muted)':''}">${r.guests||'—'}</td>
      <td class="num" style="font-weight:700;${r.cancelled?'color:var(--text-muted);text-decoration:line-through':'color:#0d9488'}">${fmt(r.suma)} zł</td>
      <td class="num" style="${r.cancelled?'color:var(--text-muted)':''}">${r.pranie>0?fmt(r.pranie)+' zł':'—'}</td>
      <td class="num" style="${r.cancelled?'color:var(--text-muted)':''}">${r.aptCena>0?fmt(r.aptCena)+' zł':'—'}</td>
      <td class="num" style="${r.cancelled?'color:var(--text-muted)':''}">${r.gosCena>0?fmt(r.gosCena)+' zł':'—'}</td>
      <td><span class="hk-note" title="${r.note}" style="${r.cancelled?'color:#dc2626;font-weight:600':''}">${r.note||'—'}</span></td>
    </tr>`).join('');
    const subtotal=`<tr style="background:${isRed?'#ffe4e6':'#f0fdfa'};border-top:1px solid ${isRed?'#fecdd3':'#99f6e4'}">
      <td style="font-weight:700;color:${isRed?'#dc2626':'#0d9488'};font-size:11px">SUMA ${date} ${dowLabel}</td>
      <td colspan="2"></td>
      <td class="num" style="font-weight:700;color:${isRed?'#dc2626':'#0d9488'}">${fmt(dayTotal)} zł</td>
      <td colspan="4"></td>
    </tr>`;
    return rowsHtml+subtotal;
  }).join('');

  const fullTable=`<div class="grid-card" style="animation:fadeUp 0.4s 0.2s ease both">
    <div class="card-title">Wszystkie sprzątania — ${activeMonth?.label||monthKey}</div>
    <div class="hk-table-wrap"><table class="hk-table">
      <thead><tr><th>Data wyjazdu</th><th>Apartament</th><th class="num">Goście</th><th class="num">Suma</th><th class="num">Pranie</th><th class="num">Apt</th><th class="num">Sprzątanie</th><th>Notatka</th></tr></thead>
      <tbody>${cleanRows}</tbody>
    </table></div>
  </div>`;

  // ── Pracownicy + Faktura ──
  const pracHTML=pracownicy.length?`<div class="grid-card" style="animation:fadeUp 0.4s 0.25s ease both">
    <div style="display:flex;gap:24px;flex-wrap:wrap;align-items:flex-start">
      <div style="flex:1;min-width:220px">
        <div class="card-title" style="margin-bottom:12px">👷 Pracownicy — ${activeMonth?.label||monthKey}</div>
        <table class="hk-table" style="font-size:12px">
          <thead><tr><th>Pracownik</th><th class="num">Kwota netto</th><th class="num">H robocze</th><th class="num">H niedziele</th></tr></thead>
          <tbody>
            ${pracownicy.map(p=>`<tr>
              <td style="font-weight:600">${p.imie}</td>
              <td class="num" style="font-weight:700;color:var(--blue)">${p.kwota}</td>
              <td class="num" style="text-align:center">${p.hRob?'✓':'—'}</td>
              <td class="num" style="text-align:center">${p.hNied?'✓':'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      ${Object.keys(faktura).length?`<div style="min-width:200px">
        <div class="card-title" style="margin-bottom:12px">🧾 Faktura</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">Suma (dashboard)</span><span style="font-weight:700">${fmt(totalSuma)} zł</span></div>
          ${faktura.pracownicy?`<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">Pracownicy</span><span style="font-weight:600">${faktura.pracownicy}</span></div>`:''}
          ${(()=>{
            const pracVal=parseFloat(String(faktura.pracownicy||'0').replace(/[^\d.,-]/g,'').replace(',','.'))||0;
            const netto=totalSuma-pracVal;
            const vat=Math.round(netto*0.23*100)/100;
            const brutto=Math.round((netto+vat)*100)/100;
            return`<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">Kwota netto</span><span style="font-weight:700;color:var(--blue)">${fmt(netto)} zł</span></div>
            <div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text-muted)">VAT 23%</span><span style="font-weight:600">${fmt(vat)} zł</span></div>
            <div style="display:flex;justify-content:space-between;font-size:13px;background:var(--blue-light);padding:8px 4px;border-radius:6px;margin-top:4px"><span style="font-weight:700;color:var(--blue)">Kwota brutto</span><span style="font-weight:700;color:var(--blue)">${fmt(brutto)} zł</span></div>`;
          })()}
        </div>
      </div>`:''}
    </div>
  </div>`:'';

  const exportBtn=`<div class="hk-export-btn" style="display:flex;justify-content:flex-end;margin-bottom:16px">
    <button onclick="exportHkPdf('${monthKey}','${activeMonth?.label||monthKey}')" style="background:#7c3aed;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:8px">
      📄 Eksportuj PDF dla firmy sprzątającej
    </button>
  </div>`;

  return monthNav+exportBtn+kpis+compChart+aptTable+pracHTML+fullTable;
}


/* OTV RESERVATIONS VIEW */
function buildOtvView(){
  const monthKey=_state.otvMonth;
  const rows=_state.data.otv[monthKey];
  const activeMonth=OTV_MONTHS.find(m=>m.key===monthKey);
  const CHAN_COLORS={'Booking.com':'#003580','Airbnb':'#FF5A5F','Profitroom':'#6366f1','Własna':'#16a34a'};
  function chanKey(p){return p.toLowerCase().includes('airbnb')?'Airbnb':p.toLowerCase().includes('booking')?'Booking.com':p.toLowerCase().includes('profitroom')?'Profitroom':'Własna';}

  const monthNav=`<div class="hk-month-nav">
    ${OTV_MONTHS.map(m=>`<button class="hk-month-btn ${m.key===monthKey?'active':''}" onclick="setOtvMonth('${m.key}')">${m.short}</button>`).join('')}
  </div>`;

  if(!rows)return monthNav+renderLoading('Ładowanie rezerwacji OTV…');
  if(rows.error)return monthNav+renderError(rows.error);
  if(!rows.length)return monthNav+`<div class="empty-section"><div class="empty-icon">📋</div><p>Brak danych dla ${activeMonth?.label||monthKey}</p></div>`;

  // ── KPIs ──
  const totalCena=rows.reduce((s,r)=>s+r.cenaCalk,0);
  const totalGola=rows.reduce((s,r)=>s+r.golaCena,0);
  const totalProw=rows.reduce((s,r)=>s+r.prowizja,0);
  const totalNoce=rows.reduce((s,r)=>s+r.noce,0);
  const avgCena=rows.length?totalCena/rows.length:0;

  // Channel breakdown for pie
  const chanMap={};
  rows.forEach(r=>{const ch=chanKey(r.partner);chanMap[ch]=(chanMap[ch]||0)+r.cenaCalk;});
  window._otvChannels=chanMap;

  const kpis=`<div class="kpi-row">
    <div class="kpi-card c-blue" style="animation-delay:0s"><div class="label">Przychód całkowity</div><div class="value"><span class="sym">zł</span>${fmt(totalCena)}</div><div class="sub">${rows.length} rezerwacji</div></div>
    <div class="kpi-card c-green" style="animation-delay:0.07s"><div class="label">Goła cena</div><div class="value"><span class="sym">zł</span>${fmt(totalGola)}</div><div class="sub">bez prowizji</div></div>
    <div class="kpi-card c-purple" style="animation-delay:0.21s"><div class="label">Prowizja łączna</div><div class="value"><span class="sym">zł</span>${fmt(totalProw)}</div><div class="sub">${totalCena>0?(totalProw/totalCena*100).toFixed(1)+'%':''}</div></div>
  </div>`;

  // ── Channel pie ──
  const chanPie=`<div class="chart-card" style="animation:fadeUp 0.4s 0.05s ease both">
    <div class="card-title">Kanały rezerwacji — ${activeMonth?.label||monthKey}</div>
    <div class="card-subtitle">Udział przychodów według źródła</div>
    <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center">
      <div style="position:relative;width:160px;height:160px;flex-shrink:0">
        <canvas id="otvChannelPie" width="160" height="160"></canvas>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center;padding:10px">
          <div style="font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Łącznie</div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${fmt(totalCena)} zł</div>
        </div>
      </div>
      <div id="otvChanLegend" style="display:flex;flex-direction:column;gap:12px;min-width:220px"></div>
    </div>
  </div>`;

  // ── Group by dataDo ──
  const byDate={};const dateOrder=[];
  rows.forEach(r=>{
    const d=(r.dataDo||'—').slice(0,10);
    if(!byDate[d]){byDate[d]=[];dateOrder.push(d);}
    byDate[d].push(r);
  });

  // Sort dates
  dateOrder.sort((a,b)=>{
    const da=parseDateDMY(a),db=parseDateDMY(b);
    if(!da||!db)return 0;
    return da-db;
  });

  // precompute holidays
  const yearsNeeded=[...new Set(rows.map(r=>{const d=parseDateDMY(r.dataDo);return d?d.getFullYear():null}).filter(Boolean))];
  const allHol={};
  yearsNeeded.forEach(y=>Object.assign(allHol,getPolishHolidays(y)));

  // Store for drawer
  window._otvByDate=byDate;
  window._otvAllHol=allHol;
  window._otvChanColors=CHAN_COLORS;
  window._otvChanKey=chanKey;

  // max value for bar scaling
  const maxDayVal=Math.max(...dateOrder.map(d=>byDate[d].reduce((s,r)=>s+r.cenaCalk,0)),1);

  // ── Tiles ──
  const tiles=dateOrder.map((date,i)=>{
    const dayRows=byDate[date];
    const dayTotal=dayRows.reduce((s,r)=>s+r.cenaCalk,0);
    const dateObj=parseDateDMY(date);
    const dk=dateObj?dateKey(dateObj):'';
    const dow=dateObj?dateObj.getDay():-1;
    const holName=allHol[dk]||'';
    const isSun=dow===0;
    const isRed=isSun||!!holName;
    const isWE=dow===0||dow===6;
    const dowLabel=dateObj?DOW_PL_SHORT[dow]:'';
    const pct=maxDayVal>0?(dayTotal/maxDayVal*100).toFixed(1):0;
    const tileColor=isRed?'var(--red-light)':isWE?'var(--purple-light)':'var(--white)';
    const barColor=isRed?'#fca5a5':isWE?'var(--purple-mid)':'var(--blue-mid)';
    const borderStyle=isWE?'border-left:3px solid var(--purple)':'';
    return`<div class="day-card clickable" style="background:${tileColor};${borderStyle};animation-delay:${Math.min(i*0.02,0.5)}s" onclick="openOtvDrawer('${date.replace(/'/g,"\'")}')">
      ${isWE?`<span class="dow-badge">${dowLabel}</span>`:''}
      <div class="date" style="margin-top:${isWE?'16px':'2px'};color:${isRed?'var(--red)':'var(--text-muted)'}">${date}${holName?` <span style="font-size:9px">🔴</span>`:''}</div>
      <div class="amount"><span class="sym">zł</span>${fmt(dayTotal)}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:3px">${dayRows.length} rez.</div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    </div>`;
  }).join('');

  const grid=`<div class="grid-card" style="animation:fadeUp 0.4s 0.1s ease both">

function buildPrevioView(){
  const monthKey=_state.previoMonth;
  const rows=_state.data.previo[monthKey];
  const activeMonth=PREVIO_MONTHS.find(m=>m.key===monthKey);
  const CHAN_COLORS={'Booking.com':'#003580','Airbnb':'#FF5A5F','Profitroom':'#6366f1','Expedia':'#00355f','Własna':'#16a34a'};

  const monthNav=`<div class="hk-month-nav">
    ${PREVIO_MONTHS.map(m=>`<button class="hk-month-btn ${m.key===monthKey?'active':''}" onclick="setPrevioMonth('${m.key}')">${m.short}</button>`).join('')}
  </div>`;

  if(!rows)return monthNav+renderLoading('Ładowanie rezerwacji Previo…');
  if(rows.error)return monthNav+renderError(rows.error);
  if(!rows.length)return monthNav+`<div class="empty-section"><div class="empty-icon">📋</div><p>Brak danych dla ${activeMonth?.label||monthKey}</p></div>`;

  // Filter to only rows whose dataDo belongs to this month
  const active=rows.filter(r=>!r.cancelled&&(r.dataDo||'').slice(0,7)===monthKey);

  // KPIs
  const totalCena=active.reduce((s,r)=>s+r.cena,0);
  const avgCena=active.length?totalCena/active.length:0;
  const totalNoce=active.reduce((s,r)=>s+r.noce,0);
  const adr=totalNoce?totalCena/totalNoce:0;

  // Channel breakdown
  const chanMap={};
  active.forEach(r=>{const ch=r.kanal||'Własna';chanMap[ch]=(chanMap[ch]||0)+r.cena;});
  window._previoChannels=chanMap;

  // Today's date for partial month calculation
  const today=new Date();
  today.setHours(0,0,0,0);
  const activeToday=active.filter(r=>{const d=parseDateDMY(r.dataDo);return d&&d<=today;});
  const totalCenaToday=activeToday.reduce((s,r)=>s+r.cena,0);
  const todayDay=today.getDate();

  const kpis=`<div class="kpi-row">
    <div class="kpi-card c-blue" style="animation-delay:0s"><div class="label">Do dziś (1–${todayDay})</div><div class="value"><span class="sym">zł</span>${fmt(totalCenaToday)}</div><div class="sub">${activeToday.length} rezerwacji</div></div>
    <div class="kpi-card c-green" style="animation-delay:0.07s"><div class="label">Cały miesiąc</div><div class="value"><span class="sym">zł</span>${fmt(totalCena)}</div><div class="sub">${active.length} rez. (w tym przyszłe)</div></div>
    <div class="kpi-card c-purple" style="animation-delay:0.14s"><div class="label">ADR</div><div class="value"><span class="sym">zł</span>${fmt(adr)}</div><div class="sub">${totalNoce} nocy łącznie</div></div>
    <div class="kpi-card c-red" style="animation-delay:0.21s"><div class="label">Anulowane</div><div class="value">${rows.filter(r=>r.cancelled).length}</div><div class="sub">z ${rows.length} rezerwacji</div></div>
  </div>`;

  // Channel pie
  const chanPie=`<div class="chart-card" style="animation:fadeUp 0.4s 0.05s ease both">
    <div class="card-title">Kanały rezerwacji — ${activeMonth?.label||monthKey}</div>
    <div style="display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:center">
      <div style="position:relative;width:160px;height:160px;flex-shrink:0">
        <canvas id="previoChannelPie" width="160" height="160"></canvas>
        <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;text-align:center;padding:10px">
          <div style="font-size:9px;font-weight:600;color:var(--text-muted);text-transform:uppercase">Łącznie</div>
          <div style="font-size:13px;font-weight:700;color:var(--text)">${fmt(totalCena)} zł</div>
        </div>
      </div>
      <div id="previoLegend" style="display:flex;flex-direction:column;gap:10px;min-width:220px"></div>
    </div>
  </div>`;

  // Group by dataDo — only show dates belonging to this month
  const byDate={};const dateOrder=[];
  rows.forEach(r=>{
    const d=(r.dataDo||'—').slice(0,10);
    // Only include if dataDo belongs to monthKey (YYYY-MM)
    if(!d.startsWith(monthKey))return;
    if(!byDate[d]){byDate[d]=[];dateOrder.push(d);}
    byDate[d].push(r);
  });
  dateOrder.sort((a,b)=>{const da=parseDateDMY(a),db=parseDateDMY(b);return da&&db?da-db:0;});

  // Holidays
  const yrs=[...new Set(rows.map(r=>{const d=parseDateDMY(r.dataDo);return d?d.getFullYear():null}).filter(Boolean))];
  const hols={};yrs.forEach(y=>Object.assign(hols,getPolishHolidays(y)));

  window._previoByDate=byDate;
  window._previoHols=hols;
  window._previoChanColors=CHAN_COLORS;

  const maxVal=Math.max(...dateOrder.map(d=>byDate[d].filter(r=>!r.cancelled).reduce((s,r)=>s+r.cena,0)),1);

  const tiles=dateOrder.map((date,i)=>{
    const dayRows=byDate[date];
    const dayActive=dayRows.filter(r=>!r.cancelled);
    const dayTotal=dayActive.reduce((s,r)=>s+r.cena,0);
    const dateObj=parseDateDMY(date);
    const dk=dateObj?dateKey(dateObj):'';
    const dow=dateObj?dateObj.getDay():-1;
    const holName=hols[dk]||'';
    const isSun=dow===0;
    const isRed=isSun||!!holName;
    const isWE=dow===0||dow===6;
    const dowLabel=dateObj?DOW_PL_SHORT[dow]:'';
    const pct=maxVal>0?(dayTotal/maxVal*100).toFixed(1):0;
    const cancelled=dayRows.filter(r=>r.cancelled).length;
    return`<div class="day-card clickable" style="background:${isRed?'var(--red-light)':isWE?'var(--purple-light)':'var(--white)'};${isWE?'border-left:3px solid var(--purple)':''};animation-delay:${Math.min(i*0.02,0.5)}s" onclick="openPrevioDrawer('${date.replace(/'/g,"\'")}')">

      <div class="amount"><span class="sym">zł</span>${fmt(dayTotal)}</div>
      <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${dayActive.length} rez.${cancelled?` · <span style="color:var(--red)">${cancelled} anu.</span>`:''}</div>
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${isRed?'#fca5a5':isWE?'var(--purple-mid)':'var(--blue-mid)'}"></div></div>
    </div>`;
  }).join('');

  const grid=`<div class="grid-card" style="animation:fadeUp 0.4s 0.1s ease both">
    <div class="card-title">Rezerwacje dzienne — ${activeMonth?.label||monthKey} <span style="font-size:11px;font-weight:400;color:var(--text-muted)">· kliknij dzień aby zobaczyć szczegóły</span></div>
    <div class="daily-grid">${tiles}</div>
  </div>`;

  const drawer=`<div class="drawer-overlay" id="previoDrawerOverlay" onclick="closePrevioDrawer()"></div>
  <div class="drawer" id="previoDrawer">
    <div class="drawer-header">
      <div><div class="drawer-title" id="previoDrawerTitle">—</div><div class="drawer-subtitle" id="previoDrawerSubtitle"></div></div>
      <button class="drawer-close" onclick="closePrevioDrawer()">✕</button>
    </div>
    <div class="drawer-body" id="previoDrawerBody" style="padding:0"></div>
  </div>`;

  return monthNav+kpis+chanPie+grid+drawer;
}

// Get Thursday-Wednesday period containing a date
function getBookingPeriod(date){
  const d=new Date(date);
  d.setHours(0,0,0,0);
  const dow=d.getDay(); // 0=Sun,1=Mon,...,4=Thu,5=Fri,6=Sat
  // Find last Thursday
  const daysToThursday=(dow>=4)?dow-4:dow+3;
  const thu=new Date(d);thu.setDate(d.getDate()-daysToThursday);
  const wed=new Date(thu);wed.setDate(thu.getDate()+6);
  return{from:thu,to:wed};
}

function getPeriodKey(thu){
  return thu.toISOString().slice(0,10);
}

function nextThursday(date){
  const d=new Date(date);
  const dow=d.getDay();
  const daysUntil=dow<=4?(4-dow):(11-dow);
  d.setDate(d.getDate()+daysUntil);
  return d;
}

function buildBookingPayoutView(){
  const state=_state;
  // Collect all Booking.com reservations from all loaded Previo months
  const allBooking=[];
  Object.values(state.data.previo).forEach(rows=>{
    if(!Array.isArray(rows))return;
    rows.forEach(r=>{
      if(r.cancelled)return;
      if(!r.kanal||!r.kanal.toLowerCase().includes('booking'))return;
      // Profitroom reservations are sometimes tagged as Booking in Previo
      // Real Booking.com vouchers are numeric (10 digits), Profitroom are alpha (7 letters)
      if(r.voucher&&!/^\d+$/.test(r.voucher))return;
      allBooking.push(r);
    });
  });

  if(!allBooking.length){
    return`<div class="empty-section"><div class="empty-icon">💰</div><p>Brak danych Booking.com — załaduj dane w zakładce Previo</p></div>`;
  }

  // Group by Thu-Wed period
  const periods={};
  allBooking.forEach(r=>{
    const d=parseDateDMY(r.dataDo);
    if(!d)return;
    const{from,to}=getBookingPeriod(d);
    const key=getPeriodKey(from);
    if(!periods[key]){
      periods[key]={from,to,payout:nextThursday(new Date(to.getTime()+86400000)),rows:[]};
    }
    periods[key].rows.push(r);
  });

  // Sort periods descending
  const sortedKeys=Object.keys(periods).sort((a,b)=>b.localeCompare(a));

  // Current and next period
  const today=new Date();today.setHours(0,0,0,0);
  const currentPeriod=getBookingPeriod(today);
  const currentKey=getPeriodKey(currentPeriod.from);

  const fmt2=d=>d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Build period selector
  const periodBtns=sortedKeys.slice(0,12).map(k=>{
    const p=periods[k];
    const isActive=_state.bookingPeriodKey===k;
    const isCurrent=k===currentKey;
    const label=`${p.from.getDate().toString().padStart(2,'0')}.${(p.from.getMonth()+1).toString().padStart(2,'0')} – ${p.to.getDate().toString().padStart(2,'0')}.${(p.to.getMonth()+1).toString().padStart(2,'0')}`;
    return`<button class="hk-month-btn ${isActive?'active':''}" onclick="setBookingPeriod('${k}')" style="${isCurrent?'border:2px solid var(--blue)':''}">${label}${isCurrent?' ●':''}</button>`;
  }).join('');

  const selKey=_state.bookingPeriodKey||currentKey||sortedKeys[0];
  const selPeriod=periods[selKey];
  if(!selPeriod)return`<div class="hk-month-nav">${periodBtns}</div><div class="empty-section"><p>Brak danych dla tego okresu</p></div>`;

  // Calculate payouts for selected period
  let totalGross=0,totalComm=0,totalFee=0,totalNet=0;
  const rows=selPeriod.rows.map(r=>{
    const g=getBookingGroup(r.apt);
    const comm=g.commission;
    const gross=r.cena;
    const commAmt=Math.round(gross*comm*100)/100;
    const feeAmt=Math.round(gross*BOOKING_TRANSACTION_FEE*100)/100;
    const net=Math.round((gross-commAmt-feeAmt)*100)/100;
    totalGross+=gross;totalComm+=commAmt;totalFee+=feeAmt;totalNet+=net;
    return{...r,gross,commAmt,feeAmt,net,comm};
  }).sort((a,b)=>a.apt.localeCompare(b.apt,'pl'));

  const isPast=selPeriod.payout<today;
  const isThisWeek=selPeriod.payout>=today&&(selPeriod.payout-today)<7*86400000;

  const header=`<div class="grid-card" style="animation:fadeUp 0.4s ease both;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <div class="card-title">Okres: ${fmt2(selPeriod.from)} – ${fmt2(selPeriod.to)}</div>
        <div class="card-subtitle">
          Przelew Booking.com: 
          <strong style="color:${isPast?'var(--text-muted)':isThisWeek?'#059669':'var(--blue)'}">${fmt2(selPeriod.payout)}</strong>
          ${isPast?'<span style="color:var(--text-muted)"> (już wypłacone)</span>':isThisWeek?'<span style="color:#059669"> ← ten tydzień!</span>':''}
        </div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em">Do wypłaty</div>
        <div style="font-size:28px;font-weight:700;color:#059669">zł ${fmt(totalNet)}</div>
      </div>
    </div>
  </div>`;

  const kpis=`<div class="kpi-row">
    <div class="kpi-card c-blue" style="animation-delay:0s"><div class="label">Kwota brutto</div><div class="value"><span class="sym">zł</span>${fmt(totalGross)}</div><div class="sub">${rows.length} rezerwacji</div></div>
    <div class="kpi-card c-red" style="animation-delay:0.07s"><div class="label">Prowizja Booking</div><div class="value"><span class="sym">zł</span>${fmt(totalComm)}</div><div class="sub">${(totalComm/totalGross*100).toFixed(1)}% brutto</div></div>
    <div class="kpi-card c-red" style="animation-delay:0.14s"><div class="label">Opłata transakcyjna</div><div class="value"><span class="sym">zł</span>${fmt(totalFee)}</div><div class="sub">1.4% brutto</div></div>
    <div class="kpi-card c-green" style="animation-delay:0.21s"><div class="label">Do wypłaty netto</div><div class="value"><span class="sym">zł</span>${fmt(totalNet)}</div><div class="sub">${(totalNet/totalGross*100).toFixed(1)}% brutto</div></div>
  </div>`;

  // Group by property object
  function getPropertyGroup(apt){
    const a=apt.toLowerCase();
    if(a.includes('plac szczep'))return'Plac Szczepański';
    if(a.includes('wawel ii')||a.includes('wawel 2'))return'Wawel II';
    if(a.includes('wawel'))return'Wawel';
    if(a.includes('katowicka'))return'Katowicka';
    if(a.includes('stawowa'))return'Stawowa';
    if(a.includes('zamkowa'))return'Zamkowa';
    if(a.includes('bronowicka'))return'Bronowicka';
    if(a.includes('orzeszkowej'))return'Orzeszkowej';
    return'Old Town Vistula Premium Apartments';
  }

  const groups={};
  rows.forEach(r=>{
    const g=getPropertyGroup(r.apt);
    if(!groups[g])groups[g]={gross:0,commAmt:0,feeAmt:0,net:0,count:0,comm:r.comm};
    groups[g].gross+=r.gross;
    groups[g].commAmt+=r.commAmt;
    groups[g].feeAmt+=r.feeAmt;
    groups[g].net+=r.net;
    groups[g].count++;
  });

  // Sort: OTV first, then alphabetically
  const groupOrder=['Old Town Vistula Premium Apartments','Wawel','Wawel II','Plac Szczepański','Katowicka','Stawowa','Zamkowa','Bronowicka','Orzeszkowej'];
  const sortedGroups=Object.keys(groups).sort((a,b)=>{
    const ai=groupOrder.indexOf(a),bi=groupOrder.indexOf(b);
    return (ai===-1?99:ai)-(bi===-1?99:bi);
  });

  const groupRows=sortedGroups.map((g,i)=>{
    const d=groups[g];
    return`<tr style="background:${i%2===0?'var(--white)':'#fafbfc'}">
      <td style="font-weight:700;font-size:13px">${g}</td>
      <td class="num" style="font-size:12px;color:var(--text-muted)">${d.count} rez.</td>
      <td class="num" style="font-size:12px">${fmt(d.gross)} zł</td>
      <td class="num" style="font-size:12px;color:var(--red)">${fmt(d.commAmt)} zł <span style="font-size:10px;color:var(--text-muted)">(${(d.commAmt/d.gross*100).toFixed(0)}%)</span></td>
      <td class="num" style="font-size:12px;color:var(--red)">${fmt(d.feeAmt)} zł</td>
      <td class="num" style="font-size:13px;font-weight:700;color:#059669">${fmt(d.net)} zł</td>
    </tr>`;
  }).join('');

  const table=`<div class="grid-card" style="animation:fadeUp 0.4s 0.1s ease both">
    <div class="card-title">Wypłaty per obiekt — ${fmt2(selPeriod.from)} – ${fmt2(selPeriod.to)}</div>
    <div class="hk-table-wrap"><table class="hk-table">
      <thead><tr>
        <th>Obiekt</th><th class="num">Rez.</th>
        <th class="num">Brutto</th><th class="num">Prowizja</th><th class="num">Opł. trans.</th><th class="num">Netto</th>
      </tr></thead>
      <tbody>${groupRows}</tbody>
      <tr class="hk-total">
        <td>ŁĄCZNIE</td><td class="num">${rows.length}</td>
        <td class="num">${fmt(totalGross)} zł</td>
        <td class="num">${fmt(totalComm)} zł</td>
        <td class="num">${fmt(totalFee)} zł</td>
        <td class="num">${fmt(totalNet)} zł</td>
      </tr>
    </table></div>
  </div>`;

  return`<div class="hk-month-nav" style="flex-wrap:wrap">${periodBtns}</div>${header}${kpis}${table}`;
}


/* DYŻURY */
function getVacations(){
  try{return JSON.parse(localStorage.getItem('dyzury_vacations')||'{}');}
  catch(e){return{};}
}
function saveVacations(v){
  localStorage.setItem('dyzury_vacations',JSON.stringify(v));
}
function toggleVacation(dateStr, person){
  const v=getVacations();
  const key=`${dateStr}__${person}`;
  if(v[key])delete v[key];
  else v[key]=true;
  saveVacations(v);
  renderApp();
}
function isOnVacation(dateStr, person){
  const v=getVacations();
  return !!v[`${dateStr}__${person}`];
}


// Dyżury state — stored in localStorage
function getDyzuryState(){
  try{
    const s=localStorage.getItem('dyzury_state');
    return s?JSON.parse(s):{};
  }catch(e){return{};}
}
function saveDyzuryState(state){
  localStorage.setItem('dyzury_state',JSON.stringify(state));
}

// Calculate who is on duty for a given date
// Kacper starts week of today (07.04.2026), changes every Monday
function getDutyPerson(dateStr, overrides){
  if(overrides&&overrides[dateStr])return overrides[dateStr];
  // Reference: week starting 2026-04-07 (Monday) = Kacper
  const ref=new Date('2026-04-06');
  const d=new Date(dateStr);
  ref.setHours(0,0,0,0);d.setHours(0,0,0,0);
  const diffDays=Math.round((d-ref)/86400000);
  const diffWeeks=Math.floor(diffDays/7);
  // Adjust for dates before reference
  const adjustedWeeks=((diffWeeks%2)+2)%2;
  return adjustedWeeks===0?'Kacper':'Artur';
}

function buildDyzuryView(){
  const overrides=getDyzuryState();
  const today=new Date();today.setHours(0,0,0,0);
  // Użyj lokalnej daty (nie UTC) żeby uniknąć błędu strefy czasowej
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const KACPER_COLOR='#3b82f6';
  const ARTUR_COLOR='#059669';
  const KACPER_LIGHT='#dbeafe';
  const ARTUR_LIGHT='#d1fae5';

  // Year selector
  const currentYear=today.getFullYear();
  const selectedYear=_state.dyzuryYear||currentYear;

  const yearBtns=[currentYear-1,currentYear,currentYear+1].map(y=>
    `<button class="hk-month-btn ${selectedYear===y?'active':''}" onclick="setDyzuryYear(${y})">${y}</button>`
  ).join('');

  const header=`<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px;margin-bottom:20px">
    <div>
      <div style="font-size:20px;font-weight:700;color:var(--text)">📅 Dyżury ${selectedYear}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:4px">Zmiana co poniedziałek · kliknij dzień aby zmienić dyżurnego</div>
    </div>
  </div>
  <div class="hk-month-nav">${yearBtns}</div>`;

  const MONTHS=['Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec','Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'];
  const DOW=['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];

  const calendars=MONTHS.map((mName,mi)=>{
    const firstDay=new Date(selectedYear,mi,1);
    const lastDay=new Date(selectedYear,mi+1,0);
    const startDow=(firstDay.getDay()+6)%7; // Monday=0

    let cells='';
    // Empty cells before first day
    for(let i=0;i<startDow;i++) cells+=`<div></div>`;

    for(let d=1;d<=lastDay.getDate();d++){
      const dateStr=`${selectedYear}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const person=getDutyPerson(dateStr,overrides);
      const isToday=dateStr===todayStr;
      const isOverride=overrides&&overrides[dateStr];
      const isKacper=person==='Kacper';
      const dow2=new Date(selectedYear,mi,d).getDay();
      const isMonday=dow2===1;
      const isSunday=dow2===0;
      const kVac=isOnVacation(dateStr,'Kacper');
      const aVac=isOnVacation(dateStr,'Artur');
      const vacIcons=(kVac?'<span title="Kacper — urlop" style="font-size:8px">🏖K</span>':'')+(aVac?'<span title="Artur — urlop" style="font-size:8px">🏖A</span>':'');

      cells+=`<div style="
        cursor:pointer;
        border-radius:6px;
        padding:4px 2px;
        text-align:center;
        background:${isKacper?KACPER_LIGHT:ARTUR_LIGHT};
        border:${isToday?'2px solid #f59e0b':isMonday?'1px solid '+(isKacper?KACPER_COLOR:ARTUR_COLOR):'1px solid transparent'};
        ${isOverride?'outline:2px dashed #f59e0b;outline-offset:-2px':''}
        font-weight:${isMonday||isToday?'700':'400'};
        font-size:11px;
        color:${isKacper?KACPER_COLOR:ARTUR_COLOR};
        transition:opacity 0.15s;
        position:relative;
        " onclick="toggleDyzur('${dateStr}')" title="${person}${isOverride?' (zmieniony)':''}${kVac?' | Kacper: urlop':''}${aVac?' | Artur: urlop':''}">
        <div style="font-size:10px;color:${isSunday?'#ef4444':'var(--text-muted)'}">${d}</div>
        <div style="font-size:9px;font-weight:600">${person[0]}</div>
        ${kVac||aVac?`<div style="font-size:7px;line-height:1;color:#b45309;margin-top:1px">${vacIcons}</div>`:''}
      </div>`;
    }

    // Count per person
    let kCount=0,aCount=0;
    for(let d=1;d<=lastDay.getDate();d++){
      const ds=`${selectedYear}-${String(mi+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(getDutyPerson(ds,overrides)==='Kacper')kCount++;else aCount++;
    }

    return`<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px;animation:fadeUp 0.3s ease both">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;font-weight:700;color:var(--text)">${mName}</div>
        <div style="font-size:10px;color:var(--text-muted)">
          <span style="color:${KACPER_COLOR};font-weight:600">K:${kCount}</span> · 
          <span style="color:${ARTUR_COLOR};font-weight:600">A:${aCount}</span>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
        ${DOW.map((d,i)=>`<div style="text-align:center;font-size:9px;font-weight:600;color:${i===6?'#ef4444':'var(--text-muted)'};padding:2px">${d}</div>`).join('')}
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
    </div>`;
  }).join('');

  const grid=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">${calendars}</div>`;

  const vacK=Object.keys(getVacations()).filter(k=>k.endsWith('__Kacper')).length;
  const vacA=Object.keys(getVacations()).filter(k=>k.endsWith('__Artur')).length;

  const legend=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin:16px 0;font-size:12px;align-items:center">
    <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:${KACPER_LIGHT};border:1px solid ${KACPER_COLOR}"></div><span style="color:${KACPER_COLOR};font-weight:600">Kacper</span></div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;background:${ARTUR_LIGHT};border:1px solid ${ARTUR_COLOR}"></div><span style="color:${ARTUR_COLOR};font-weight:600">Artur</span></div>
    <div style="display:flex;align-items:center;gap:6px"><div style="width:12px;height:12px;border-radius:3px;border:2px dashed #f59e0b;background:white"></div><span style="color:#92400e">Zmieniony</span></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="font-size:13px">🏖️</span><span style="color:#b45309;font-weight:600">Urlop</span></div>
    <div style="display:flex;gap:6px;margin-left:8px">
      <button onclick="toggleVacationMode('Kacper')" id="vacBtn-Kacper" style="background:${_state.vacationMode==='Kacper'?'#b45309':'var(--white)'};color:${_state.vacationMode==='Kacper'?'#fff':'var(--text-muted)'};border:1px solid ${_state.vacationMode==='Kacper'?'#b45309':'var(--border)'};border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">🏖️ Urlop Kacper</button>
      <button onclick="toggleVacationMode('Artur')" style="background:${_state.vacationMode==='Artur'?'#b45309':'var(--white)'};color:${_state.vacationMode==='Artur'?'#fff':'var(--text-muted)'};border:1px solid ${_state.vacationMode==='Artur'?'#b45309':'var(--border)'};border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">🏖️ Urlop Artur</button>
      ${_state.vacationMode?'<button onclick="toggleVacationMode(null)" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text-muted)">&#10005; Wyłącz tryb urlopu</button>':''}
    </div>
    <button onclick="resetDyzury()" style="margin-left:auto;background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text-muted)">↺ Resetuj dyżury</button>
    ${vacK||vacA?`<button onclick="resetVacations()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer;color:#b45309">↺ Resetuj urlopy (K:${vacK} A:${vacA})</button>`:''}
  </div>`;

  return`<div style="max-width:1200px;margin:0 auto">${header}${legend}${grid}</div>`;
}

function toggleDyzur(dateStr){
  // Jeśli tryb urlopu — zaznacz urlop zamiast zmieniać dyżur
  if(_state.vacationMode){
    toggleVacation(dateStr,_state.vacationMode);
    return;
  }
  const overrides=getDyzuryState();
  const current=getDutyPerson(dateStr,overrides);
  overrides[dateStr]=current==='Kacper'?'Artur':'Kacper';
  saveDyzuryState(overrides);
  if(_state.section==='dyzury')renderApp();
}

function toggleVacationMode(person){
  _state.vacationMode=_state.vacationMode===person?null:person;
  if(_state.section==='dyzury')renderApp();
}

function resetVacations(){
  if(confirm('Usunąć wszystkie zaznaczone urlopy?')){
    saveVacations({});
    if(_state.section==='dyzury')renderApp();
  }
}

function resetDyzury(){
  if(confirm('Zresetować wszystkie ręczne zmiany dyżurów?')){
    saveDyzuryState({});
    if(_state.section==='dyzury')renderApp();
  }
}

function setDyzuryYear(year){
  _state.dyzuryYear=year;
  renderApp();
}


/* AIRBNB PAYOUT */
function buildAirbnbPayoutView(){
  // Collect all Airbnb reservations from loaded Previo months
  const allAirbnb=[];
  Object.values(_state.data.previo).forEach(rows=>{
    if(!Array.isArray(rows))return;
    rows.forEach(r=>{
      if(r.cancelled)return;
      if(!r.kanal||!r.kanal.toLowerCase().includes('airbnb'))return;
      // Skip Profitroom tylko dla Booking (Airbnb ma alfanumeryczne vouchery — to normalne)
      allAirbnb.push(r);
    });
  });

  if(!allAirbnb.length){
    const previoKeys=Object.keys(_state.data.previo).filter(k=>Array.isArray(_state.data.previo[k]));
    const loadingKeys=Object.keys(_state.data.previo).filter(k=>_state.data.previo[k]===null);
    if(loadingKeys.length>0){
      return`<div class="empty-section"><div class="spinner"></div><p>Ładowanie danych Previo… (${previoKeys.length} miesięcy gotowych)</p></div>`;
    }
    // Debug: show what kanals we have
    const allKanals=[...new Set(Object.values(_state.data.previo).filter(Array.isArray).flat().map(r=>r.kanal).filter(Boolean))];
    return`<div class="empty-section"><div class="empty-icon">💸</div><p>Brak rezerwacji Airbnb w załadowanych danych</p><p style="font-size:11px;margin-top:6px;color:var(--text-muted)">Załadowane miesiące: ${previoKeys.join(', ')||'brak'}</p><p style="font-size:11px;color:var(--text-muted)">Kanały w danych: ${allKanals.join(', ')||'brak'}</p></div>`;
  }

  const today=new Date();today.setHours(0,0,0,0);
  const fmt2=d=>d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric'});

  // Group by check-in date (dataOd) — payout = day after check-in
  const byCheckin={};
  allAirbnb.forEach(r=>{
    const d=parseDateDMY(r.dataOd);
    if(!d)return;
    const key=r.dataOd;
    if(!byCheckin[key]){byCheckin[key]={date:d,rows:[]};}
    byCheckin[key].rows.push(r);
  });

  // Sort descending
  const sortedKeys=Object.keys(byCheckin).sort((a,b)=>{
    return byCheckin[b].date-byCheckin[a].date;
  });

  // Find today's payout = checkins from yesterday
  const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
  const yesterdayStr=yesterday.toISOString().slice(0,10);

  // Period selector — show last 30 days of checkins
  const recentKeys=sortedKeys.filter(k=>{
    const d=byCheckin[k].date;
    const diff=(today-d)/86400000;
    return diff<=30&&diff>=-7;
  }).slice(0,20);

  // Domyślnie: znajdź klucz gdzie wypłata jest dziś lub najbliższy wcześniejszy
  function findDefaultKey(){
    const localDk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    // 1. Wypłata dziś = zameldowania wczoraj (data lokalna, nie UTC)
    const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
    const yk=localDk(yesterday);
    if(byCheckin[yk])return yk;
    // 2. Najbliższy przeszły dzień z zameldowaniami
    const past=recentKeys.filter(k=>localDk(byCheckin[k].date)<=localDk(today));
    if(past.length)return past[0];
    // 3. Fallback
    return recentKeys[0]||sortedKeys[0];
  }
  const selKey=_state.airbnbPayoutKey||findDefaultKey();

  const periodBtns=recentKeys.map(k=>{
    const p=byCheckin[k];
    const isActive=selKey===k;
    const payoutDate=new Date(p.date);payoutDate.setDate(p.date.getDate()+1);
    const isToday=payoutDate.getTime()===today.getTime();
    const label=`${String(p.date.getDate()).padStart(2,'0')}.${String(p.date.getMonth()+1).padStart(2,'0')}`;
    return`<button class="hk-month-btn ${isActive?'active':''}" onclick="setAirbnbPayout('${k}')" style="${isToday?'border:2px solid #FF5A5F':''}">${label}${isToday?' ●':''}</button>`;
  }).join('');

  if(!selKey||!byCheckin[selKey]){
    return`<div class="hk-month-nav" style="flex-wrap:wrap">${periodBtns}</div><div class="empty-section"><p>Brak danych dla tego okresu</p></div>`;
  }

  const selPeriod=byCheckin[selKey];
  const payoutDate=new Date(selPeriod.date);payoutDate.setDate(selPeriod.date.getDate()+1);
  const isToday2=payoutDate.getTime()===today.getTime();
  const isPast=payoutDate<today;

  // Calculate netto (Airbnb pays netto — cenaNetto if available, else cena/1.155)
  const rows=selPeriod.rows.map(r=>{
    const netto=r.cenaNetto!=null?r.cenaNetto:Math.round(r.cena*0.845*100)/100;
    return{...r,netto};
  }).sort((a,b)=>a.apt.localeCompare(b.apt,'pl'));

  const totalNetto=rows.reduce((s,r)=>s+r.netto,0);

  // Group by property
  const grouped={};
  BOOKING_GROUPS.forEach(g=>{grouped[g.name]={name:g.name,netto:0,count:0};});
  rows.forEach(r=>{
    const g=getBookingGroup(r.apt);
    if(!grouped[g.name])grouped[g.name]={name:g.name,netto:0,count:0};
    grouped[g.name].netto+=r.netto;
    grouped[g.name].count+=1;
  });

  const header=`<div class="grid-card" style="animation:fadeUp 0.4s ease both;margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
      <div>
        <div class="card-title">Zameldowania: ${fmt2(selPeriod.date)} → Wypłata: ${fmt2(payoutDate)}</div>
        <div class="card-subtitle">${isToday2?'<span style="color:#FF5A5F;font-weight:600">← dzisiejsza wypłata</span>':isPast?'<span style="color:var(--text-muted)">już wypłacone</span>':'<span style="color:#059669">nadchodząca wypłata</span>'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:var(--text-muted);text-transform:uppercase">Do wypłaty netto</div>
        <div style="font-size:28px;font-weight:700;color:#FF5A5F">zł ${fmt(totalNetto)}</div>
      </div>
    </div>
  </div>`;

  const kpis=`<div class="kpi-row">
    <div class="kpi-card" style="border-left:3px solid #FF5A5F;animation-delay:0s"><div class="label">Netto do wypłaty</div><div class="value" style="color:#FF5A5F"><span class="sym">zł</span>${fmt(totalNetto)}</div><div class="sub">${rows.length} rezerwacji</div></div>
    <div class="kpi-card c-blue" style="animation-delay:0.07s"><div class="label">Śr. per rezerwacja</div><div class="value"><span class="sym">zł</span>${fmt(rows.length?totalNetto/rows.length:0)}</div><div class="sub">netto</div></div>
    <div class="kpi-card c-green" style="animation-delay:0.14s"><div class="label">Obiektów</div><div class="value">${Object.values(grouped).filter(g=>g.count>0).length}</div><div class="sub">z danymi</div></div>
  </div>`;

  const groupRows=Object.values(grouped).filter(g=>g.count>0).map((g,i)=>`<tr style="background:${i%2===0?'var(--white)':'#fafbfc'}">
    <td style="font-weight:700;font-size:13px">${g.name}</td>
    <td class="num" style="font-size:12px;color:var(--text-muted)">${g.count} rez.</td>
    <td class="num" style="font-size:13px;font-weight:700;color:#FF5A5F">${fmt(g.netto)} zł</td>
  </tr>`).join('');

  const table=`<div class="grid-card" style="animation:fadeUp 0.4s 0.1s ease both">
    <div class="card-title">Wypłata Airbnb per obiekt — zameldowania ${fmt2(selPeriod.date)}</div>

      <tr class="hk-total"><td colspan="2">ŁĄCZNIE</td><td class="num">${fmt(totalNetto)} zł</td></tr>
    </table></div>
  </div>`;

  return`<div class="hk-month-nav" style="flex-wrap:wrap">${periodBtns}</div>${header}${kpis}${table}`;
}

function parseParkingText(text){
  // Format z maila (tabulatory): LP \t Bilet \t Data \t 23:59 \t Dni \t x24h \t + \t H \t h \t [zapas|miesięczny]
  const results=[];
  const lines=text.split('\n');
  let lp=1;

  for(const line of lines){
    const raw=line.replace(/>/g,'').trim();
    if(!raw)continue;

    // Szukaj numeru biletu (10-15 cyfr)
    const biletM=raw.match(/\b(\d{10,15})\b/);
    if(!biletM)continue;
    const bilet=biletM[1];

    // Szukaj daty DD.MM.YYYY
    const dataM=raw.match(/(\d{1,2})\.(\d{2})\.(\d{4})/);
    if(!dataM)continue;
    const dataStr=`${dataM[1].padStart(2,'0')}.${dataM[2]}.${dataM[3]}`;

    // Sprawdź miesięczny
    if(raw.includes('miesięczny')){
      results.push({lp:lp++,bilet,dataWaznosci:dataStr,dni:999,h:0,totalH:999*24,godziny:'miesięczny',typ:'miesięczny',alert:false});
      continue;
    }

    // Parsuj dni i godziny — szukaj wzorca: liczba x24h + liczba h
    // Format w maila: "8 \t x24h \t + \t 0 \t h" lub "8x24h+0h"
    const parts=raw.split(/[\t\s]+/).filter(Boolean);
    let dni=0,h=0,found=false;

    // Szukaj wzorca z tabulatorami: LICZBA x24h + LICZBA h
    const dniIdx=parts.findIndex(p=>p==='x24h'||p.match(/^\d+x24h/));
    if(dniIdx!==-1){
      if(parts[dniIdx]==='x24h'){
        // Format: "8 x24h + 0 h"
        dni=parseInt(parts[dniIdx-1])||0;
        const plusIdx=parts.indexOf('+',dniIdx);
        if(plusIdx!==-1)h=parseInt(parts[plusIdx+1])||0;
      } else {
        // Format: "8x24h+0h"
        const gM=parts[dniIdx].match(/(\d+)x24h\+(\d+)h/);
        if(gM){dni=parseInt(gM[1]);h=parseInt(gM[2]);}
      }
      found=true;
    }
    if(!found)continue;

    const totalH=dni*24+h;
    const godziny=`${dni}x24h+${h}h`;
    const typ=raw.includes('zapas')?'zapas':'normalny';

    results.push({lp:lp++,bilet,dataWaznosci:dataStr,dni,h,totalH,godziny,typ,alert:dni<6});
  }
  return results;
}


async function loadParkingData(){
  const apiKey=CONFIG.previoApiKey||CONFIG.apiKey;
  const spreadsheetId=CONFIG.previoSpreadsheetId;
  if(!apiKey||!spreadsheetId)throw new Error('MISSING_CONFIG');
  const enc=encodeURIComponent("'Parking'!A1:J2000");
  const url=`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${enc}?valueRenderOption=UNFORMATTED_VALUE&key=${apiKey}`;
  const data=await apiFetch(url);
  const rows=data.values||[];
  if(rows.length<2)throw new Error('NO_PARKING_DATA');

  // Grupuj wiersze po dacie maila (kolumna A)
  const byDate={};
  const dateOrder=[];
  rows.slice(1).forEach(r=>{
    const mailDate=String(r[0]||'').trim();
    const bilet=String(r[2]||'').trim();
    if(!mailDate||!bilet)return;
    if(!byDate[mailDate]){byDate[mailDate]=[];dateOrder.push(mailDate);}
    byDate[mailDate].push({
      mailDate,
      lp:       parseInt(r[1])||0,
      bilet,
      dataWaznosci: String(r[3]||'').trim(),
      pozostalo: String(r[4]||'').trim(),
      dni:      parseInt(r[5])||0,
      h:        parseInt(r[6])||0,
      typ:      String(r[7]||'normalny').trim(),
      alert:    String(r[8]||'').trim()==='TAK',
    });
  });

  // Sortuj daty malejąco (najnowszy pierwszy)
  dateOrder.sort((a,b)=>b.localeCompare(a));
  return{byDate,dateOrder};
}
function getPaidDates(){
  if(_paidCache!==null)return _paidCache;
  try{_paidCache=JSON.parse(localStorage.getItem('parking_paid_dates')||'[]');return _paidCache;}
  catch(e){_paidCache=[];return[];}
}

function togglePaidDate(dateKey){
  const paid=getPaidDates();
  const idx=paid.indexOf(dateKey);
  if(idx!==-1)paid.splice(idx,1);
  else paid.push(dateKey);
  _paidCache=paid;
  localStorage.setItem('parking_paid_dates',JSON.stringify(paid));
  syncPushPaid(paid); // async — nie blokuje UI
  renderApp();
}

function buildParkingView(){
  const sheetsData=_state.data.parking;
  const THRESHOLD=6;
  const selDate=_state.parkingDate||null;

  // ── Główne ciało buildParkingView ──
  if(!sheetsData||!sheetsData.dateOrder?.length){
    return`<div class="empty-section"><div class="spinner"></div><p>Ładowanie danych parkingu…</p></div>`;
  }

  const{byDate,dateOrder}=sheetsData;
  const activeDateKey=selDate&&byDate[selDate]?selDate:dateOrder[0];
  const cards=byDate[activeDateKey]||[];

  const dateBtns=dateOrder.map(d=>{
    const paidDates=getPaidDates();
    const isPaid=paidDates.includes(d);
    const hasAlerts=(byDate[d]||[]).some(c=>c.alert);
    const dotColor=isPaid?'#16a34a':hasAlerts?'#dc2626':'#16a34a';
    const dot=`<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dotColor};margin-left:5px;vertical-align:middle"></span>`;
    return`<button class="hk-month-btn ${d===activeDateKey?'active':''}" onclick="setParkingDate('${d}')" style="${d===activeDateKey?'':''}">📅 ${d}${dot}</button>`;
  }).join('');
  const dateNav=`<div class="hk-month-nav" style="margin-bottom:20px">${dateBtns}</div>`;

  return`<div style="max-width:1100px;margin:0 auto">${dateNav}${renderTable(cards,activeDateKey)}</div>`;

  function renderTable(cards, dateKey){
    if(!cards||!cards.length)return'';
    const paidDates=getPaidDates();
    const isPaidDate=paidDates.includes(dateKey);
    const alerts=cards.filter(c=>c.alert);
    const effectiveAlerts=isPaidDate?0:alerts.length;

    const kpis=`<div class="kpi-row" style="margin-bottom:20px">
      <div class="kpi-card c-red"><div class="label">Wymaga doładowania</div><div class="value" style="color:${effectiveAlerts>0?'#dc2626':'#16a34a'}">${effectiveAlerts}</div><div class="sub">poniżej ${THRESHOLD} dni</div></div>
      <div class="kpi-card"><div class="label">Łącznie</div><div class="value">${cards.length}</div><div class="sub">wszystkich kart</div></div>
    </div>`;

    const rows=cards.map((c,i)=>{
      const isAlert=c.alert&&!isPaidDate;
      const isMies=c.typ==='miesięczny';
      const bg=isPaidDate&&c.alert?'#f0fdf4':isAlert?'#fef2f2':i%2===0?'var(--white)':'#fafbfc';
      const pozostalo=isMies?'miesięczny':(c.pozostalo||`${c.dni} dni ${c.h}h`);
      const pozostaloColor=isPaidDate&&c.alert?'#16a34a':isAlert?'#dc2626':c.dni<14?'#f59e0b':'#16a34a';
      const statusCell=isPaidDate&&c.alert
        ?`<span style="background:#dcfce7;color:#16a34a;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px">✓ Opłacono</span>`
        :isAlert
          ?`<span style="background:#fecaca;color:#dc2626;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px">⚠️ DOŁADUJ</span>`
          :`<span style="color:#16a34a;font-size:13px">✓</span>`;
      // Sprawdź czy data ważności karty wygasa za mniej niż 8 dni
      const expiryAlert=(()=>{
        if(!c.dataWaznosci||c.typ==='miesięczny')return false;
        const parts=c.dataWaznosci.split('.');
        if(parts.length!==3)return false;
        const exp=new Date(parseInt(parts[2]),parseInt(parts[1])-1,parseInt(parts[0]));
        const today=new Date();today.setHours(0,0,0,0);
        const daysLeft=Math.ceil((exp-today)/(1000*60*60*24));
        return daysLeft<8;
      })();
      const expiryStyle=expiryAlert?'background:#fef2f2;color:#dc2626;font-weight:700;border-radius:4px;padding:1px 6px':'';
      const expiryStatusCell=expiryAlert&&!isAlert
        ?`<span style="background:#fecaca;color:#dc2626;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px">⚠️ DOŁADUJ</span>`
        :statusCell;
      const effectiveBg=expiryAlert&&!isAlert?'#fef2f2':bg;
      return`<tr style="background:${effectiveBg}">
        <td style="text-align:center;font-weight:700;color:var(--text-muted);font-size:11px">${c.lp}</td>
        <td style="font-family:monospace;font-size:11px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis">${c.bilet.slice(0,-4)}<strong>${c.bilet.slice(-4)}</strong></td>
        <td style="text-align:center;font-size:12px"><span style="${expiryStyle}">${c.dataWaznosci||''}</span></td>
        <td style="text-align:center;font-weight:700;color:${pozostaloColor};font-size:13px">${pozostalo}</td>
        <td style="text-align:center">${expiryStatusCell}</td>
      </tr>`;
    }).join('');

    const paidBtn=alerts.length>0?`<button onclick="togglePaidDate('${dateKey}')" style="background:${isPaidDate?'#f0fdf4':'#059669'};border:1px solid ${isPaidDate?'#16a34a':'#059669'};color:${isPaidDate?'#16a34a':'#fff'};font-size:12px;font-weight:600;padding:8px 18px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif">${isPaidDate?'↩ Cofnij opłatę':'✓ Opłacono wszystkie'}</button>`:'';

    const table=`<div class="grid-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:10px">
        <div class="card-title">Stan kart parkingowych</div>
        ${paidBtn}
      </div>
      <div class="card-subtitle">Karty poniżej ${THRESHOLD} dni wymagają doładowania</div>
      <div class="hk-table-wrap"><table class="hk-table" style="table-layout:fixed;width:100%">
        <colgroup>
          <col style="width:48px">
          <col style="width:160px">
          <col style="width:110px">
          <col style="width:130px">
          <col style="width:140px">
        </colgroup>
        <thead><tr>
          <th style="text-align:center">L.P.</th>
          <th style="text-align:left">Nr biletu</th>
          <th style="text-align:center">Ważny do</th>
          <th style="text-align:center">Pozostało</th>
          <th style="text-align:center">Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;

    return kpis+table;
  }
}

async function fetchParkingFromGmail(){
  const btn=document.querySelector('button[onclick="fetchParkingFromGmail()"]');
  if(btn){btn.textContent='⏳ Pobieranie...';btn.disabled=true;}

  try{
    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail'}],
        messages:[{role:'user',content:'Użyj narzędzia gmail_search_messages aby znaleźć maile z subject:stany kart (maxResults: 1). Następnie użyj gmail_read_message aby pobrać treść najnowszego. Zwróć TYLKO surową treść body maila bez żadnych komentarzy, formatowania ani wstępów.'}]
      })
    });

    const data=await response.json();
    const text=data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'';

    if(!text.trim()){
      alert('Nie znaleziono maila "stany kart" na Gmailu.');
      return;
    }

    // Wstaw do textarea i parsuj
    const ta=document.getElementById('parkingInput');
    if(ta)ta.value=text;
    const cards=parseParkingText(text);
    if(!cards.length){
      alert('Pobrano mail ale nie udało się sparsować danych. Sprawdź ręcznie.');
      return;
    }
    const saved={
      rawText:text,
      cards,
      date:new Date().toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})
    };
    localStorage.setItem('parking_data',JSON.stringify(saved));
    renderApp();
  }catch(e){
    alert('Błąd pobierania z Gmaila: '+e.message);
  }finally{
    if(btn){btn.textContent='📧 Pobierz z Gmaila';btn.disabled=false;}
  }
}

function parseParkingInput(){
  const text=document.getElementById('parkingInput')?.value||'';
  if(!text.trim()){alert('Wklej treść maila.');return;}
  const cards=parseParkingText(text);

function exportHkPdf(monthKey, monthLabel){
  const hkData=_state.data.housekeeping[monthKey];
  const rows=hkData?.rows||hkData||[];
  const pracownicy=hkData?.pracownicy||[];
  const faktura=hkData?.faktura||{};
  const activeRows=rows.filter(r=>!r.cancelled);
  const totalSuma=activeRows.reduce((s,r)=>s+r.suma,0);
  const totalPranie=activeRows.reduce((s,r)=>s+r.pranie,0);
  const totalApt=activeRows.reduce((s,r)=>s+r.aptCena,0);
  const totalGos=activeRows.reduce((s,r)=>s+r.gosCena,0);

  // Per-apt summary
  const byApt={};
  activeRows.forEach(r=>{
    if(!byApt[r.apt])byApt[r.apt]={suma:0,count:0,pranie:0,aptCena:0,gosCena:0};
    byApt[r.apt].suma+=r.suma;
    byApt[r.apt].count++;
    byApt[r.apt].pranie+=r.pranie;
    byApt[r.apt].aptCena+=r.aptCena;
    byApt[r.apt].gosCena+=r.gosCena;
  });
  const aptsSorted=sortByDefaultOrder(Object.keys(byApt));

  // Faktura values
  const pracVal=parseFloat(String(faktura.pracownicy||'0').replace(/[^\d.,-]/g,'').replace(',','.'))||0;
  const netto=totalSuma-pracVal;
  const vat=Math.round(netto*0.23*100)/100;
  const brutto=Math.round((netto+vat)*100)/100;

  const aptRows=aptsSorted.map((apt,i)=>{
    const d=byApt[apt];
    return`<tr style="background:${i%2===0?'#fff':'#f8fafc'}">
      <td style="padding:6px 10px;font-weight:600;font-size:12px">${apt}</td>

      <td style="padding:6px 10px;text-align:right;font-weight:700;font-size:12px">${fmt(d.suma)} zł</td>
    </tr>`;
  }).join('');

  const pracRows=pracownicy.map(p=>`<tr>
    <td style="padding:7px 10px;font-weight:600;font-size:12px">${p.imie}</td>
    <td style="padding:7px 10px;text-align:right;font-weight:700;font-size:12px;color:#1e40af">${p.kwota}</td>

    <td style="padding:7px 10px;text-align:center;font-size:12px">${p.hNied?'✓':'—'}</td>
  </tr>`).join('');

  // Full cleanings table
  const byDate={};const dateOrder=[];
  rows.forEach(r=>{
    const d=r.dataDo||r.date||'—';
    if(!byDate[d]){byDate[d]=[];dateOrder.push(d);}
    byDate[d].push(r);
  });
  // precompute holidays for PDF
  const pdfYears=[...new Set(rows.map(r=>{const d=parseDateDMY(r.date);return d?d.getFullYear():null}).filter(Boolean))];

/* DRAWER */
let _drawerSort='default';
let _drawerDay=null;

function openDrawer(dayName){
  const enriched=window._currentEnriched||[];
  const day=enriched.find(d=>d.name===dayName);
  if(!day)return;
  _drawerDay=dayName;

  // highlight active card
  document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('active-drawer'));
  const card=document.querySelector(`.day-card[data-day="${dayName}"]`);
  if(card)card.classList.add('active-drawer');

  document.getElementById('drawerTitle').textContent=`${dayName} — rozbicie per apartament`;
  const dow=DOW_PL[day.date?.getDay()??new Date().getDay()];
  document.getElementById('drawerSubtitle').textContent=`${dow} · łącznie: ${fmt(day.value||0)} zł`;
  renderDrawerBody(day);

  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
  document.querySelectorAll('.day-card').forEach(c=>c.classList.remove('active-drawer'));
  _drawerDay=null;
}

function setDrawerSort(s){
  _drawerSort=s;
  document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('sort'+s.charAt(0).toUpperCase()+s.slice(1))?.classList.add('active');
  if(_drawerDay){
    const day=(window._currentEnriched||[]).find(d=>d.name===_drawerDay);
    if(day)renderDrawerBody(day);
  }
}

function renderDrawerBody(day){
  const breakdown=day.aptBreakdown||{};
  const allApts=window._allApts||Object.keys(breakdown);
  const dayTotal=day.value||0;

  // include ALL apartments (even 0 for this day)
  let rows=allApts.map(name=>({name,value:breakdown[name]||0}));

  if(_drawerSort==='desc')rows.sort((a,b)=>b.value-a.value);
  else if(_drawerSort==='asc')rows.sort((a,b)=>a.value-b.value);
  else rows=sortByDefaultOrder(rows.map(r=>r.name)).map(name=>rows.find(r=>r.name===name)).filter(Boolean);

  const maxVal=Math.max(...rows.map(r=>r.value),1);

  const rowsHtml=rows.map((r,i)=>{
    const pct=r.value>0?(r.value/dayTotal*100).toFixed(1):'0.0';
    const barW=Math.round(r.value/maxVal*100);
    return`<div class="drawer-row ${r.value===0?'zero':''}">
      <div class="drawer-row-rank">${i+1}</div>
      <div class="drawer-row-name" title="${r.name}">${r.name}</div>
      <div class="drawer-row-bar"><div class="drawer-row-bar-fill" style="width:${barW}%"></div></div>
      <div class="drawer-row-pct">${pct}%</div>
      <div class="drawer-row-val">${r.value>0?fmt(r.value):'—'}</div>
    </div>`;
  }).join('');

  document.getElementById('drawerBody').innerHTML=rowsHtml+`
    <div class="drawer-total">
      <span class="drawer-total-label">Łącznie</span>
      <span class="drawer-total-val">${fmt(dayTotal)} zł</span>
    </div>`;
}

function renderMonthlyTable(){
  const totals=window._monthlyAptTotals||{};
  const apts=window._allApts||[];
  const grand=window._grandTotal||0;
  const sort=window._monthlySortOrder||'default';
  let sorted=[...apts];
  if(sort==='total')sorted.sort((a,b)=>(totals[b]||0)-(totals[a]||0));
  else if(sort==='name')sorted.sort((a,b)=>a.localeCompare(b,'pl'));
  else sorted=sortByDefaultOrder(sorted);

  // top3 / bottom3 by value (ignore zeros)
  const withVal=sorted.filter(a=>(totals[a]||0)>0);
  const byVal=[...withVal].sort((a,b)=>(totals[b]||0)-(totals[a]||0));
  const top3=new Set(byVal.slice(0,3));
  const bot3=new Set(byVal.slice(-3));

  const maxV=Math.max(...sorted.map(a=>totals[a]||0),1);
  const body=document.getElementById('monthlyAptBody');
  if(!body)return;
  body.innerHTML=sorted.map(apt=>{
    const total=totals[apt]||0;
    const pct=grand>0?(total/grand*100).toFixed(1):'0.0';
    const barW=Math.round(total/maxV*100);
    const isTop=top3.has(apt)&&total>0;
    const isBot=bot3.has(apt)&&total>0&&!isTop;
    const rowBg=isTop?'var(--green-light)':isBot?'var(--red-light)':'';
    const valColor=isTop?'var(--green)':isBot?'var(--red)':'var(--blue)';
    const badge=isTop?'<span style="font-size:10px;margin-left:5px">🟢</span>':isBot?'<span style="font-size:10px;margin-left:5px">🔴</span>':'';
    return`<tr style="background:${rowBg}">
      <td style="font-weight:600">${apt}${badge}</td>
      <td style="text-align:right;font-weight:700;color:${valColor};font-variant-numeric:tabular-nums">${fmt(total)} zł</td>
      <td style="text-align:right;color:var(--text-muted);font-variant-numeric:tabular-nums">${pct}%</td>
      <td style="width:120px"><div style="background:var(--border);border-radius:3px;overflow:hidden;height:8px"><div style="height:100%;width:${barW}%;background:${isTop?'var(--green)':isBot?'var(--red)':'var(--blue)'};border-radius:3px"></div></div></td>
    </tr>`;
  }).join('')+`<tr class="grand-total"><td>ŁĄCZNIE</td><td style="text-align:right;font-variant-numeric:tabular-nums">${fmt(grand)} zł</td><td style="text-align:right">100%</td><td></td></tr>`;
}

function sortMonthlyTable(by){
  // cycle: total → name → default
  const current=window._monthlySortOrder||'default';
  if(by==='name') window._monthlySortOrder= current==='name'?'default':'name';
  else if(by==='total') window._monthlySortOrder= current==='total'?'default':'total';
  else window._monthlySortOrder='default';
  renderMonthlyTable();
}

let _selectedAptId = null;

function selectApartment(id){
  // toggle off if same
  if(_selectedAptId===id){
    _selectedAptId=null;
    document.querySelectorAll('tbody tr.selected').forEach(r=>r.classList.remove('selected'));
    document.getElementById('aptChipWrap').innerHTML='';
    document.getElementById('lineChartTitle').textContent='Trend miesięczny — 2025 vs 2026 — wszystkie lokale';
    updateLineChart(null);
    return;
  }
  _selectedAptId=id;
  // highlight row
  document.querySelectorAll('tbody tr.selected').forEach(r=>r.classList.remove('selected'));
  const row=document.querySelector(`tbody tr[data-aptid="${id}"]`);
  if(row){row.classList.add('selected');row.scrollIntoView({behavior:'smooth',block:'nearest'});}
  // find apt
  const apt=window._mediaApartments?.find(a=>a.id===id);
  if(!apt)return;
  // update chip
  const chip=document.getElementById('aptChipWrap');
  if(chip)chip.innerHTML=`<span class="apt-chip">${apt.name}<span class="chip-close" onclick="selectApartment('${id.replace(/'/g,"\'")}')">✕</span></span>`;
  const title=document.getElementById('lineChartTitle');
  if(title)title.textContent=`Trend miesięczny — 2025 vs 2026 — ${apt.name}`;
  updateLineChart(apt);
}

function updateLineChart(apt){
  const lc=_charts.line;
  if(!lc)return;
  const sm=['Sty','Lut','Mar','Kwi','Maj','Cze','Lip','Sie','Wrz','Paź','Lis','Gru'];
  if(!apt){
    // back to all
    const apts=window._mediaApartments||[];
    lc.data.datasets[0].data=sm.map((_,i)=>apts.reduce((s,a)=>s+a.values[i],0));
    lc.data.datasets[1].data=sm.map((_,i)=>apts.reduce((s,a)=>s+a.values[12+i],0));
    lc.data.datasets[0].label='2025 — wszystkie';
    lc.data.datasets[1].label='2026 — wszystkie';
  } else {
    lc.data.datasets[0].data=apt.values.slice(0,12);
    lc.data.datasets[1].data=apt.values.slice(12,24);
    lc.data.datasets[0].label='2025 — '+apt.name;
    lc.data.datasets[1].label='2026 — '+apt.name;

  lc.update('active');
}

let _kalCache=null;

async function syncPull(){
  if(!CONFIG.syncUrl)return;
  try{
    const results=await Promise.allSettled([
      fetch(`${CONFIG.syncUrl}?action=getKalendar`).then(r=>r.json()),
      fetch(`${CONFIG.syncUrl}?action=getParkingPaid`).then(r=>r.json()),
      fetch(`${CONFIG.syncUrl}?action=getDone`).then(r=>r.json()),
      fetch(`${CONFIG.syncUrl}?action=getKsefPaid`).then(r=>r.json()),
    ]);
    const kalData=results[0].status==='fulfilled'?results[0].value:null;
    const paidData=results[1].status==='fulfilled'?results[1].value:null;
    const doneData=results[2].status==='fulfilled'?results[2].value:null;
    const ksefPaidData=results[3].status==='fulfilled'?results[3].value:null;
    if(kalData?.events){
      _kalCache=kalData.events;
      localStorage.setItem('kal_events',JSON.stringify(_kalCache));
    }
    if(paidData?.paidDates){
      _paidCache=paidData.paidDates;
      localStorage.setItem('parking_paid_dates',JSON.stringify(_paidCache));
    }
    if(doneData?.done){
      _doneCache=doneData.done;
      localStorage.setItem('kal_done',JSON.stringify(_doneCache));
    }
    if(ksefPaidData?.paidMap){
      _ksefPaidCache=ksefPaidData.paidMap;
      localStorage.setItem('ksef_paid_map',JSON.stringify(_ksefPaidCache));
    }
  }catch(e){console.warn('syncPull failed:',e);}
}

// ── Polskie święta (ruchome + stałe) ──
function getPolishHolidaySet(year){
  const fixed=[
    `${year}-01-01`,`${year}-01-06`,`${year}-05-01`,`${year}-05-03`,
    `${year}-08-15`,`${year}-11-01`,`${year}-11-11`,`${year}-12-25`,`${year}-12-26`,
  ];
  // Wielkanoc (algorytm Meeusa)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const ii=Math.floor(c/4),k=c%4,l=(32+2*e+2*ii-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const mo=Math.floor((h+l-7*m+114)/31);
  const dy=((h+l-7*m+114)%31)+1;
  const easter=new Date(year,mo-1,dy);
  const addD=(d,n)=>{const r=new Date(d);r.setDate(r.getDate()+n);return r;};
  const fmt=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  const moveable=[easter,addD(easter,1),addD(easter,49),addD(easter,60)].map(fmt);
  return new Set([...fixed,...moveable]);
}

// ── Następny dzień roboczy od daty (włącznie) ──
function nextWorkday(date){
  const d=new Date(date);
  d.setHours(0,0,0,0);
  const holidays=getPolishHolidaySet(d.getFullYear());
  while(true){
    const dow=d.getDay();
    const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if(dow!==0&&dow!==6&&!holidays.has(dk))return d;
    d.setDate(d.getDate()+1);
    // Sprawdź też następny rok jeśli przekraczamy granicę
    if(!holidays.has(dk)){}// recheck with new year holidays if needed
  }
}

// ── Generuj daty dla wydarzeń cyklicznych ──
function getRecurringDates(baseDate, recur, horizonMonths=13){
  const dates=[];
  const base=new Date(baseDate);
  const horizon=new Date();
  horizon.setMonth(horizon.getMonth()+horizonMonths);

  if(recur==='none'){
    dates.push(baseDate);
  } else if(recur==='monthly'){
    let d=new Date(base);
    while(d<=horizon){
      const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      dates.push(dk);
      d.setMonth(d.getMonth()+1);
    }
  } else if(recur==='yearly'){
    let d=new Date(base);
    while(d<=horizon){
      const dk=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      dates.push(dk);
      d.setFullYear(d.getFullYear()+1);
    }
  }
  return dates;
}

// ── ZUS: 15-ty każdego miesiąca → następny dzień roboczy ──
function generateZusDates(horizonMonths=13){
  const dates=[];
  const today=new Date();
  for(let i=-1;i<horizonMonths;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,15);
    const workday=nextWorkday(d);
    const dk=`${workday.getFullYear()}-${String(workday.getMonth()+1).padStart(2,'0')}-${String(workday.getDate()).padStart(2,'0')}`;
    dates.push(dk);
  }
  return dates;
}

// ── Generuj daty płatności dla danego dnia miesiąca ──
function generatePaymentDates(dayOfMonth, horizonMonths=13){
  const dates=[];
  const today=new Date();
  for(let i=-1;i<horizonMonths;i++){
    const d=new Date(today.getFullYear(),today.getMonth()+i,dayOfMonth);
    const workday=nextWorkday(d);
    const dk=`${workday.getFullYear()}-${String(workday.getMonth()+1).padStart(2,'0')}-${String(workday.getDate()).padStart(2,'0')}`;
    dates.push(dk);
  }
  return dates;
}

function ensureAutoPayments(){
  const events=getKalEvents();
  let changed=false;
  AUTO_PAYMENTS.forEach(({prefix,day,title,desc})=>{
    const dates=generatePaymentDates(day);
    dates.forEach(dk=>{
      const dayEvs=events[dk]||[];
      const hasIt=dayEvs.some(e=>e.id&&e.id.startsWith(prefix+'-'));
      if(!hasIt){
        if(!events[dk])events[dk]=[];
        events[dk].push({
          id:`${prefix}-${dk}`,
          title,desc,
          cat:'platnosc',
          recur:'monthly',
          isAuto:true,
        });
        changed=true;
      }
    });
  });
  if(changed)saveKalEvents(events);
}

function getEventsForMonth(year, month){
  const events=getKalEvents();
  const result={};
  // Przeglądaj wszystkie zapisane daty
  Object.keys(events).forEach(dk=>{
    const [y,m]=dk.split('-').map(Number);
    if(y===year&&m===month+1){
      result[dk]=events[dk];
    }
  });
  return result;
}
